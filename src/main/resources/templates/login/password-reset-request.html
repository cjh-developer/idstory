<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security" lang="ko">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title th:text="#{reset.title}">비밀번호 초기화</title>

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"/>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css"/>
    <link rel="stylesheet" th:href="@{/css/common.css}"/>
    <link rel="stylesheet" th:href="@{/css/login.css}"/>
</head>
<body>

<div class="login-wrapper">
    <div class="login-card">

        <!-- 파란 카드 헤더 -->
        <div class="card-header-blue">
            <div class="icon-circle"><i class="fas fa-key"></i></div>
            <h1 th:text="#{reset.title}">비밀번호 초기화</h1>
            <p  th:text="#{reset.subtitle}">아이디와 이메일을 입력하면 초기화 링크를 제공합니다.</p>
        </div>

        <div class="card-body-p">

            <!-- 오류 메세지 -->
            <div th:if="${errorKey}" class="alert alert-danger" role="alert">
                <i class="fas fa-circle-exclamation"></i>
                <span th:text="#{${errorKey}}">오류가 발생했습니다.</span>
            </div>

            <form th:action="@{/password-reset}" method="post" novalidate>

                <!-- 아이디 -->
                <div class="field-group">
                    <label class="field-label" for="username" th:text="#{reset.username}">사용자 아이디</label>
                    <div class="field-wrap">
                        <i class="fas fa-user field-icon"></i>
                        <input id="username" name="username" type="text"
                               class="form-input no-right-pad"
                               th:placeholder="#{reset.username.placeholder}"
                               required autofocus/>
                    </div>
                </div>

                <!-- 이메일 -->
                <div class="field-group" style="margin-bottom:1.3rem;">
                    <label class="field-label" for="email" th:text="#{reset.email}">이메일 주소</label>
                    <div class="field-wrap">
                        <i class="fas fa-envelope field-icon"></i>
                        <input id="email" name="email" type="email"
                               class="form-input no-right-pad"
                               th:placeholder="#{reset.email.placeholder}"
                               required/>
                    </div>
                </div>

                <button type="submit" class="btn-primary-blue" th:text="#{reset.submit}">초기화 링크 받기</button>

            </form>

            <!-- 비로그인: 로그인으로 / 로그인 중: 메인으로 -->
            <a class="back-link" sec:authorize="!isAuthenticated()" th:href="@{/login}">
                <i class="fas fa-arrow-left"></i>
                <span th:text="#{reset.back}">로그인으로 돌아가기</span>
            </a>
            <a class="back-link" sec:authorize="isAuthenticated()" th:href="@{/main/dashboard}">
                <i class="fas fa-arrow-left"></i>
                <span th:text="#{reset.back.main}">메인페이지로 복귀</span>
            </a>

        </div>

        <div class="card-footer-line">
            <p th:text="#{common.copyright}">© 2024 IDStory.</p>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/js/common.js}"></script>
</body>
</html>
