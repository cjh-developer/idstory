<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:replace="~{include/layout :: head('인증코드 발행 이력')}"></head>
<body>

<header th:replace="~{include/header :: header}"></header>

<div class="app-body">
    <aside th:replace="~{include/sidebar :: sidebar}"></aside>

    <main class="app-content">

        <div class="page-header">
            <div>
                <div class="breadcrumb-area">
                    <i class="fas fa-house"></i>
                    <i class="fas fa-chevron-right"></i>
                    <span>시스템 연계</span>
                    <i class="fas fa-chevron-right"></i>
                    <span>인증코드 발행 이력</span>
                </div>
                <h2 class="page-title">인증코드 발행 이력</h2>
                <p class="page-subtitle">SSO 로그인 요청 시 발행된 Authorization Code 이력을 조회합니다.</p>
            </div>
        </div>

        <!-- 검색 필터 -->
        <div class="card" style="margin-bottom:1rem;">
            <div class="card-body">
                <form th:action="@{/sso/auth-codes}" method="get"
                      style="display:flex;flex-wrap:wrap;gap:.8rem;align-items:flex-end;">
                    <div>
                        <label style="display:block;font-size:.82rem;font-weight:600;margin-bottom:.3rem;">클라이언트</label>
                        <select name="clientId" class="modal-input" style="width:200px;">
                            <option value="">전체</option>
                            <option th:each="c : ${ssoClients}"
                                    th:value="${c.clientId}"
                                    th:text="${c.clientId}"
                                    th:selected="${c.clientId == clientId}">client_id</option>
                        </select>
                    </div>
                    <div>
                        <label style="display:block;font-size:.82rem;font-weight:600;margin-bottom:.3rem;">상태</label>
                        <select name="status" class="modal-input" style="width:130px;">
                            <option value="">전체</option>
                            <option value="ISSUED"  th:selected="${status == 'ISSUED'}">ISSUED</option>
                            <option value="USED"    th:selected="${status == 'USED'}">USED</option>
                            <option value="EXPIRED" th:selected="${status == 'EXPIRED'}">EXPIRED</option>
                        </select>
                    </div>
                    <div>
                        <label style="display:block;font-size:.82rem;font-weight:600;margin-bottom:.3rem;">계정</label>
                        <input type="text" name="userId" class="modal-input" th:value="${userId}" placeholder="계정 검색" style="width:150px;"/>
                    </div>
                    <div>
                        <label style="display:block;font-size:.82rem;font-weight:600;margin-bottom:.3rem;">시작 날짜</label>
                        <input type="date" name="dateFrom" class="modal-input" th:value="${dateFrom}" style="width:145px;"/>
                    </div>
                    <div>
                        <label style="display:block;font-size:.82rem;font-weight:600;margin-bottom:.3rem;">종료 날짜</label>
                        <input type="date" name="dateTo" class="modal-input" th:value="${dateTo}" style="width:145px;"/>
                    </div>
                    <div style="display:flex;gap:.5rem;">
                        <button type="submit" class="btn-modal-save" style="padding:.45rem 1rem;">
                            <i class="fas fa-magnifying-glass"></i> 검색
                        </button>
                        <a th:href="@{/sso/auth-codes}" class="btn-modal-cancel" style="padding:.45rem 1rem;text-decoration:none;">초기화</a>
                    </div>
                </form>
            </div>
        </div>

        <!-- 인증코드 목록 -->
        <div class="card">
            <div class="card-header">
                <span class="card-title"><i class="fas fa-code-branch"></i> 인증코드 발행 이력</span>
                <span style="font-size:.78rem;color:var(--gray-400);">
                    총 <strong th:text="${codePage.totalElements}">0</strong>건
                </span>
            </div>
            <div class="card-body" style="padding:0;">
                <div class="menu-table-wrap">
                    <table class="menu-table">
                        <thead>
                        <tr>
                            <th style="width:100px;">상태</th>
                            <th style="width:160px;">클라이언트</th>
                            <th style="width:120px;">계정</th>
                            <th>Auth Code (마스킹)</th>
                            <th>Redirect URI</th>
                            <th style="width:155px;">발행일시</th>
                            <th style="width:155px;">만료일시</th>
                            <th style="width:120px;">IP</th>
                        </tr>
                        </thead>
                        <tbody>
                        <tr th:each="c : ${codePage.content}">
                            <td class="cell-center">
                                <span th:switch="${c.status}">
                                    <span th:case="'ISSUED'"  class="role-badge" style="background:var(--blue-100,#dbeafe);color:var(--blue-700,#1d4ed8);">ISSUED</span>
                                    <span th:case="'USED'"    class="role-badge" style="background:#dcfce7;color:#166534;">USED</span>
                                    <span th:case="'EXPIRED'" class="role-badge" style="background:#f3f4f6;color:var(--gray-500);">EXPIRED</span>
                                    <span th:case="*"         class="role-badge" th:text="${c.status}">STATUS</span>
                                </span>
                            </td>
                            <td><code th:text="${c.clientId}" style="font-size:.8rem;">client_id</code></td>
                            <td th:text="${c.userId}">userId</td>
                            <td>
                                <span th:text="${#strings.substring(c.authCode, 0, 8) + '••••••••' + #strings.substring(c.authCode, c.authCode.length() - 4)}"
                                      style="font-size:.8rem;font-family:monospace;color:var(--gray-500);">code</span>
                            </td>
                            <td>
                                <span th:text="${c.redirectUri}"
                                      style="font-size:.8rem;color:var(--gray-500);word-break:break-all;">uri</span>
                            </td>
                            <td th:text="${#temporals.format(c.issuedAt, 'yyyy-MM-dd HH:mm:ss')}" style="font-size:.82rem;color:var(--gray-500);"></td>
                            <td th:text="${#temporals.format(c.expiresAt, 'yyyy-MM-dd HH:mm:ss')}" style="font-size:.82rem;color:var(--gray-500);"></td>
                            <td th:text="${c.ipAddress} ?: '—'" style="font-size:.82rem;color:var(--gray-500);"></td>
                        </tr>
                        <tr th:if="${codePage.content.isEmpty()}">
                            <td colspan="8" class="cell-empty">인증코드 이력이 없습니다.</td>
                        </tr>
                        </tbody>
                    </table>
                </div>
            </div>

            <!-- 페이지네이션 -->
            <div th:if="${codePage.totalPages > 1}"
                 style="display:flex;justify-content:center;gap:.4rem;padding:1rem;">
                <a th:if="${!codePage.first}"
                   th:href="@{/sso/auth-codes(page=${codePage.number - 1},clientId=${clientId},userId=${userId},status=${status},dateFrom=${dateFrom},dateTo=${dateTo})}"
                   style="padding:.3rem .7rem;border:1px solid var(--gray-200);border-radius:6px;text-decoration:none;color:var(--gray-600);">
                    <i class="fas fa-chevron-left"></i>
                </a>
                <th:block th:each="i : ${#numbers.sequence(0, codePage.totalPages - 1)}">
                    <a th:href="@{/sso/auth-codes(page=${i},clientId=${clientId},userId=${userId},status=${status},dateFrom=${dateFrom},dateTo=${dateTo})}"
                       th:text="${i + 1}"
                       th:style="${i == codePage.number} ?
                           'padding:.3rem .7rem;border:1px solid var(--blue-500);border-radius:6px;text-decoration:none;background:var(--blue-500);color:#fff;' :
                           'padding:.3rem .7rem;border:1px solid var(--gray-200);border-radius:6px;text-decoration:none;color:var(--gray-600);'">1</a>
                </th:block>
                <a th:if="${!codePage.last}"
                   th:href="@{/sso/auth-codes(page=${codePage.number + 1},clientId=${clientId},userId=${userId},status=${status},dateFrom=${dateFrom},dateTo=${dateTo})}"
                   style="padding:.3rem .7rem;border:1px solid var(--gray-200);border-radius:6px;text-decoration:none;color:var(--gray-600);">
                    <i class="fas fa-chevron-right"></i>
                </a>
            </div>
        </div>

    </main>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/js/common.js}"></script>
</body>
</html>
