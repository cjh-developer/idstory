<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:replace="~{include/layout :: head('홈')}"></head>
<body>

<header th:replace="~{include/header :: header}"></header>

<div class="app-body">
    <aside th:replace="~{include/sidebar :: sidebar}"></aside>

    <main class="app-content">

        <div class="page-header">
            <div>
                <div class="breadcrumb-area">
                    <i class="fas fa-house"></i>
                    <i class="fas fa-chevron-right"></i>
                    <span>홈</span>
                </div>
                <h2 class="page-title" th:text="#{home.welcome}">환영합니다</h2>
                <p class="page-subtitle" th:text="#{home.description}">IDStory 시스템에 오신 것을 환영합니다.</p>
            </div>
        </div>

        <div class="card">
            <div class="card-header">
                <span class="card-title">
                    <i class="fas fa-user-circle"></i> 내 계정
                </span>
            </div>
            <div class="card-body">
                <table style="width:100%; border-collapse:collapse; font-size:.875rem;">
                    <tr style="border-bottom:1px solid var(--gray-100);">
                        <th style="padding:.7rem 0; width:120px; color:var(--gray-500); font-weight:600; text-align:left;">아이디</th>
                        <td style="padding:.7rem 0; color:var(--gray-800);" sec:authentication="name">username</td>
                    </tr>
                    <tr>
                        <th style="padding:.7rem 0; color:var(--gray-500); font-weight:600; text-align:left;">권한</th>
                        <td style="padding:.7rem 0; color:var(--gray-800);" sec:authentication="principal.authorities">role</td>
                    </tr>
                </table>
                <div style="margin-top:1.2rem;">
                    <a th:href="@{/password-reset}"
                       style="font-size:.83rem; color:var(--blue-600); text-decoration:none;">
                        <i class="fas fa-key" style="margin-right:.3rem;"></i>비밀번호 변경
                    </a>
                </div>
            </div>
        </div>

    </main>
</div>

<footer th:replace="~{include/footer :: footer}"></footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/js/common.js}"></script>
</body>
</html>
