<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:replace="~{include/layout :: head('클라이언트 관리')}"></head>
<body>

<header th:replace="~{include/header :: header}"></header>

<div class="app-body">
    <aside th:replace="~{include/sidebar :: sidebar}"></aside>

    <main class="app-content">

        <!-- 페이지 헤더 -->
        <div class="page-header">
            <div>
                <div class="breadcrumb-area">
                    <i class="fas fa-house"></i>
                    <i class="fas fa-chevron-right"></i>
                    <span>사용자 관리</span>
                    <i class="fas fa-chevron-right"></i>
                    <span>클라이언트 관리</span>
                </div>
                <h2 class="page-title">클라이언트 관리</h2>
                <p class="page-subtitle">시스템/서비스 클라이언트를 계층 구조로 관리합니다.</p>
            </div>
            <button type="button" class="btn-add-menu" data-bs-toggle="modal" data-bs-target="#modalRegister">
                <i class="fas fa-plus"></i> 클라이언트 등록
            </button>
        </div>

        <!-- 토스트 알림 -->
        <div id="toast-wrap"
             style="position:fixed;top:1.2rem;right:1.4rem;z-index:9999;min-width:280px;display:none;">
            <div id="toast-inner"
                 style="padding:.75rem 1.1rem;border-radius:8px;color:#fff;
                        font-size:.88rem;font-weight:600;display:flex;align-items:center;gap:.6rem;
                        box-shadow:0 4px 12px rgba(0,0,0,.18);">
                <i id="toast-icon"></i>
                <span id="toast-msg"></span>
            </div>
        </div>

        <!-- 옵션 바 -->
        <div style="display:flex;align-items:center;gap:1rem;margin-bottom:1rem;">
            <button type="button" class="btn btn-sm btn-outline-secondary" onclick="loadTree()">
                <i class="fas fa-rotate-right"></i> 새로고침
            </button>
        </div>

        <!-- 2열 레이아웃 -->
        <div style="display:flex;gap:1.2rem;align-items:flex-start;">

            <!-- ── 왼쪽: 클라이언트 트리 ─────────────────────────────────────── -->
            <div class="card" style="width:320px;flex-shrink:0;min-height:500px;">
                <div class="card-body" style="padding:1rem;">
                    <div style="font-size:.85rem;font-weight:700;color:#374151;margin-bottom:.6rem;">
                        <i class="fas fa-plug-circle-bolt" style="margin-right:.4rem;color:#2563eb;"></i>클라이언트 트리
                    </div>
                    <div style="position:relative;margin-bottom:.7rem;">
                        <i class="fas fa-search" style="position:absolute;left:.6rem;top:50%;transform:translateY(-50%);color:#9ca3af;font-size:.8rem;pointer-events:none;"></i>
                        <input type="text" id="treeSearch"
                               placeholder="코드 또는 이름 검색"
                               oninput="filterTree()"
                               style="width:100%;padding:.38rem .7rem .38rem 1.9rem;font-size:.83rem;
                                      border:1px solid #d1d5db;border-radius:6px;outline:none;box-sizing:border-box;">
                        <button id="btnClearSearch" onclick="clearSearch()"
                                style="display:none;position:absolute;right:.5rem;top:50%;transform:translateY(-50%);
                                       background:none;border:none;cursor:pointer;color:#9ca3af;font-size:.75rem;padding:0;">
                            <i class="fas fa-times"></i>
                        </button>
                    </div>
                    <div id="searchResultInfo" style="display:none;font-size:.76rem;color:#6b7280;margin-bottom:.4rem;"></div>
                    <div id="clientTree" style="font-size:.88rem;line-height:1.6;">
                        <div style="color:#9ca3af;font-size:.83rem;padding:.5rem;">로딩 중...</div>
                    </div>
                </div>
            </div>

            <!-- ── 오른쪽: 클라이언트 상세 ──────────────────────────────────── -->
            <div class="card" style="flex:1;min-height:500px;">
                <div class="card-body" id="clientDetail"
                     style="padding:1.5rem;color:#9ca3af;font-size:.88rem;">
                    <div style="text-align:center;padding:3rem 0;">
                        <i class="fas fa-hand-pointer" style="font-size:2rem;margin-bottom:.8rem;display:block;"></i>
                        왼쪽 트리에서 클라이언트를 선택하면 상세 정보가 표시됩니다.
                    </div>
                </div>
            </div>

        </div><!-- end 2열 레이아웃 -->

    </main>
</div>

<!-- ════════════════════════════════════════════════════════════════════════════
     모달: 클라이언트 등록
     ════════════════════════════════════════════════════════════════════════════ -->
<div class="modal fade" id="modalRegister" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-lg modal-dialog-scrollable">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title"><i class="fas fa-plus-circle" style="margin-right:.5rem;"></i>클라이언트 등록</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <form id="formRegister" novalidate>
                <div class="modal-body" style="padding:1.5rem;">
                    <div class="row g-3">
                        <div class="col-md-4">
                            <label class="form-label modal-label">클라이언트 코드 <span style="color:#ef4444;">*</span></label>
                            <input type="text" id="regClientCode" name="clientCode" class="modal-input w-100"
                                   placeholder="예: SYS_PORTAL" maxlength="50" style="text-transform:uppercase;">
                        </div>
                        <div class="col-md-8">
                            <label class="form-label modal-label">클라이언트명 <span style="color:#ef4444;">*</span></label>
                            <input type="text" id="regClientName" name="clientName" class="modal-input w-100"
                                   placeholder="클라이언트명 입력" maxlength="100">
                        </div>
                        <div class="col-md-6">
                            <label class="form-label modal-label">상위 클라이언트</label>
                            <select id="regParentOid" name="parentOid" class="modal-input w-100">
                                <option value="">— 최상위 —</option>
                            </select>
                        </div>
                        <div class="col-md-3">
                            <label class="form-label modal-label">정렬 순서</label>
                            <input type="number" id="regSortOrder" name="sortOrder" class="modal-input w-100" value="0" min="0">
                        </div>
                        <div class="col-md-3">
                            <label class="form-label modal-label">사용여부</label>
                            <select id="regUseYn" name="useYn" class="modal-input w-100">
                                <option value="Y">Y (사용)</option>
                                <option value="N">N (미사용)</option>
                            </select>
                        </div>
                        <div class="col-12">
                            <label class="form-label modal-label">설명</label>
                            <textarea id="regDescription" name="description" class="modal-input w-100"
                                      rows="2" maxlength="500" placeholder="클라이언트 설명"></textarea>
                        </div>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary btn-sm" data-bs-dismiss="modal">닫기</button>
                    <button type="button" class="btn btn-primary btn-sm" onclick="submitRegister()">
                        <i class="fas fa-save"></i> 저장
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>

<!-- ════════════════════════════════════════════════════════════════════════════
     JavaScript
     ════════════════════════════════════════════════════════════════════════════ -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/js/common.js}"></script>
<script>
    let allClients   = [];
    let selectedOid  = null;
    let searchKeyword = '';

    document.addEventListener('DOMContentLoaded', loadTree);

    // ── 트리 로드 ─────────────────────────────────────────────────
    function loadTree() {
        fetch('/auth/client/tree')
            .then(r => r.json())
            .then(data => {
                allClients = flattenTree(data);
                renderTree(data);
                updateParentSelect(document.getElementById('regParentOid'), allClients, null);
                if (selectedOid) {
                    const c = allClients.find(c => c.clientOid === selectedOid);
                    if (c) renderDetail(c);
                }
            })
            .catch(() => {
                document.getElementById('clientTree').innerHTML =
                    '<div style="color:#ef4444;font-size:.83rem;padding:.5rem;">로드 실패</div>';
            });
    }

    function flattenTree(nodes, result = []) {
        nodes.forEach(n => {
            result.push(n);
            if (n.children && n.children.length > 0) flattenTree(n.children, result);
        });
        return result;
    }

    // ── 검색 ─────────────────────────────────────────────────────
    function filterTree() {
        searchKeyword = document.getElementById('treeSearch').value.trim();
        document.getElementById('btnClearSearch').style.display = searchKeyword ? 'block' : 'none';
        const roots = buildRoots(allClients);
        renderTree(roots);
    }

    function clearSearch() {
        document.getElementById('treeSearch').value = '';
        searchKeyword = '';
        document.getElementById('btnClearSearch').style.display = 'none';
        document.getElementById('searchResultInfo').style.display = 'none';
        const roots = buildRoots(allClients);
        renderTree(roots);
    }

    function buildRoots(flat) {
        const map = {};
        flat.forEach(c => { map[c.clientOid] = { ...c, children: [] }; });
        const roots = [];
        flat.forEach(c => {
            if (c.parentOid && map[c.parentOid]) {
                map[c.parentOid].children.push(map[c.clientOid]);
            } else {
                roots.push(map[c.clientOid]);
            }
        });
        return roots;
    }

    function computeFilterInfo(flat, keyword) {
        if (!keyword) return null;
        const kw = keyword.toLowerCase();
        const matched = new Set(flat.filter(c =>
            c.clientName.toLowerCase().includes(kw) || c.clientCode.toLowerCase().includes(kw)
        ).map(c => c.clientOid));

        const oidToParent = {};
        flat.forEach(c => { oidToParent[c.clientOid] = c.parentOid; });
        const visible = new Set(matched);
        matched.forEach(oid => {
            let cur = oidToParent[oid];
            while (cur) { visible.add(cur); cur = oidToParent[cur]; }
        });
        return { matched, visible };
    }

    function highlight(text, keyword) {
        if (!keyword) return text;
        const kw = keyword.toLowerCase();
        const idx = text.toLowerCase().indexOf(kw);
        if (idx === -1) return text;
        return text.substring(0, idx)
            + `<mark style="background:#fef08a;padding:0;border-radius:2px;">${text.substring(idx, idx + keyword.length)}</mark>`
            + text.substring(idx + keyword.length);
    }

    // ── 트리 렌더링 ───────────────────────────────────────────────
    function renderTree(roots) {
        const treeEl = document.getElementById('clientTree');
        const infoEl = document.getElementById('searchResultInfo');
        const filterInfo = computeFilterInfo(allClients, searchKeyword);

        if (filterInfo) {
            const cnt = filterInfo.matched.size;
            infoEl.style.display = 'block';
            infoEl.textContent = cnt > 0 ? `검색 결과: ${cnt}건` : '검색 결과가 없습니다.';
        } else {
            infoEl.style.display = 'none';
        }

        if (!roots || roots.length === 0) {
            treeEl.innerHTML = '<div style="color:#9ca3af;font-size:.83rem;padding:.5rem;">등록된 클라이언트가 없습니다.</div>';
            return;
        }

        const html = buildTreeHtml(roots, 0, filterInfo);
        treeEl.innerHTML = html || '<div style="color:#9ca3af;font-size:.83rem;padding:.5rem;">검색 결과가 없습니다.</div>';
    }

    function buildTreeHtml(nodes, depth, filterInfo) {
        let html = '';
        const sorted = [...nodes].sort((a, b) => a.sortOrder - b.sortOrder);
        for (const node of sorted) {
            if (filterInfo && !filterInfo.visible.has(node.clientOid)) continue;

            const hasChildren = node.children && node.children.length > 0;
            const isDisabled  = node.useYn !== 'Y';
            const isMatched   = filterInfo ? filterInfo.matched.has(node.clientOid) : false;
            const isSelected  = node.clientOid === selectedOid;
            const indent = depth * 16;

            let labelStyle = `cursor:pointer;padding:.28rem .5rem;border-radius:6px;display:flex;align-items:center;gap:.5rem;`;
            if (isSelected) labelStyle += 'background:#eff6ff;font-weight:700;';
            if (isDisabled) labelStyle += 'color:#f59e0b;';
            if (isMatched && !isSelected) labelStyle += 'border-left:3px solid #2563eb;padding-left:.35rem;';

            let badge = isDisabled
                ? '<span style="font-size:.7rem;background:#fef3c7;color:#b45309;padding:1px 5px;border-radius:4px;margin-left:.3rem;">미사용</span>'
                : '';

            const icon = hasChildren ? 'fa-folder' : 'fa-cube';
            const iconColor = isDisabled ? '#f59e0b' : '#2563eb';
            const nameHtml = highlight(node.clientName, searchKeyword);
            const codeHtml = highlight(node.clientCode, searchKeyword);

            html += `<div style="margin-left:${indent}px;">
                <div style="${labelStyle}" onclick="selectClient('${node.clientOid}')">
                    <i class="fas ${icon}" style="color:${iconColor};font-size:.8rem;width:14px;"></i>
                    <span>${nameHtml}</span>
                    <span style="font-size:.75rem;color:#9ca3af;">(${codeHtml})</span>
                    ${badge}
                </div>`;
            if (hasChildren) html += buildTreeHtml(node.children, depth + 1, filterInfo);
            html += '</div>';
        }
        return html;
    }

    // ── 선택 → 상세 패널 ─────────────────────────────────────────
    function selectClient(oid) {
        selectedOid = oid;
        const c = allClients.find(c => c.clientOid === oid);
        if (!c) return;
        renderDetail(c);
        const roots = buildRoots(allClients);
        renderTree(roots);
    }

    function getParentName(parentOid) {
        if (!parentOid) return '—';
        const p = allClients.find(c => c.clientOid === parentOid);
        return p ? `${p.clientName} (${p.clientCode})` : parentOid;
    }

    function formatDate(dt) {
        if (!dt) return '—';
        return dt.replace('T', ' ').substring(0, 16);
    }

    function renderDetail(c) {
        const rows = [
            ['클라이언트 OID',  c.clientOid],
            ['클라이언트 코드', c.clientCode],
            ['클라이언트명',    c.clientName],
            ['상위 클라이언트', getParentName(c.parentOid)],
            ['설명',            c.description || '—'],
            ['정렬 순서',       c.sortOrder],
            ['사용여부', c.useYn === 'Y'
                ? '<span class="badge bg-success">Y</span>'
                : '<span class="badge bg-warning text-dark">N</span>'],
            ['생성 일시', formatDate(c.createdAt) + (c.createdBy ? ` (${c.createdBy})` : '')],
            ['수정 일시', formatDate(c.updatedAt) + (c.updatedBy ? ` (${c.updatedBy})` : '')],
        ];

        let tableHtml = rows.map(([k, v]) =>
            `<tr>
               <td style="width:130px;font-weight:600;color:#6b7280;font-size:.82rem;padding:.45rem .8rem;">${k}</td>
               <td style="font-size:.88rem;padding:.45rem .8rem;">${v}</td>
             </tr>`
        ).join('');

        document.getElementById('clientDetail').innerHTML = `
            <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:1rem;">
                <h5 style="margin:0;font-size:1rem;font-weight:700;">${c.clientName}</h5>
                <div style="display:flex;gap:.5rem;">
                    <button type="button" class="btn btn-outline-primary btn-sm" onclick="openEditPanel()">
                        <i class="fas fa-pen"></i> 수정
                    </button>
                    <button type="button" class="btn btn-outline-danger btn-sm" onclick="deleteClient('${c.clientOid}')">
                        <i class="fas fa-trash"></i> 삭제
                    </button>
                </div>
            </div>
            <table class="table table-sm table-borderless" style="margin:0;">${tableHtml}</table>
            <div id="editPanel" style="display:none;margin-top:1.5rem;border-top:1px solid #e5e7eb;padding-top:1.2rem;">
                <h6 style="font-size:.9rem;font-weight:700;margin-bottom:1rem;">정보 수정</h6>
                <div class="row g-3">
                    <div class="col-md-4">
                        <label class="form-label modal-label">클라이언트 코드</label>
                        <input type="text" id="editClientCode" class="modal-input w-100" readonly
                               style="background:#f3f4f6;color:#6b7280;" value="${c.clientCode}">
                    </div>
                    <div class="col-md-8">
                        <label class="form-label modal-label">클라이언트명 <span style="color:#ef4444;">*</span></label>
                        <input type="text" id="editClientName" class="modal-input w-100" value="${c.clientName}" maxlength="100">
                    </div>
                    <div class="col-md-6">
                        <label class="form-label modal-label">상위 클라이언트</label>
                        <select id="editParentOid" class="modal-input w-100"></select>
                    </div>
                    <div class="col-md-3">
                        <label class="form-label modal-label">정렬 순서</label>
                        <input type="number" id="editSortOrder" class="modal-input w-100" value="${c.sortOrder}" min="0">
                    </div>
                    <div class="col-md-3">
                        <label class="form-label modal-label">사용여부</label>
                        <select id="editUseYn" class="modal-input w-100">
                            <option value="Y" ${c.useYn === 'Y' ? 'selected' : ''}>Y (사용)</option>
                            <option value="N" ${c.useYn === 'N' ? 'selected' : ''}>N (미사용)</option>
                        </select>
                    </div>
                    <div class="col-12">
                        <label class="form-label modal-label">설명</label>
                        <textarea id="editDescription" class="modal-input w-100" rows="2" maxlength="500">${c.description || ''}</textarea>
                    </div>
                    <div class="col-12 text-end">
                        <button type="button" class="btn btn-secondary btn-sm me-1" onclick="closeEditPanel()">취소</button>
                        <button type="button" class="btn btn-primary btn-sm" onclick="submitEdit('${c.clientOid}')">
                            <i class="fas fa-save"></i> 저장
                        </button>
                    </div>
                </div>
            </div>`;

        // 수정 패널용 상위 select 구성 (자기 자신 제외)
        updateParentSelect(document.getElementById('editParentOid'), allClients, c.clientOid);
        const editParent = document.getElementById('editParentOid');
        if (editParent) editParent.value = c.parentOid || '';
    }

    function openEditPanel() {
        document.getElementById('editPanel').style.display = 'block';
    }

    function closeEditPanel() {
        document.getElementById('editPanel').style.display = 'none';
    }

    // ── 상위 select 갱신 ─────────────────────────────────────────
    function updateParentSelect(sel, flat, excludeOid) {
        if (!sel) return;
        sel.innerHTML = '<option value="">— 최상위 —</option>';
        flat.forEach(c => {
            if (c.clientOid === excludeOid) return;
            const opt = document.createElement('option');
            opt.value = c.clientOid;
            opt.textContent = `${c.clientName} (${c.clientCode})`;
            sel.appendChild(opt);
        });
    }

    // ── 등록 ─────────────────────────────────────────────────────
    function submitRegister() {
        const code = document.getElementById('regClientCode').value.trim();
        const name = document.getElementById('regClientName').value.trim();
        if (!code) { showToast('클라이언트 코드를 입력하세요.', false); return; }
        if (!name) { showToast('클라이언트명을 입력하세요.', false); return; }

        const fd = new FormData();
        fd.append('clientCode',  code.toUpperCase());
        fd.append('clientName',  name);
        fd.append('parentOid',   document.getElementById('regParentOid').value);
        fd.append('sortOrder',   document.getElementById('regSortOrder').value);
        fd.append('useYn',       document.getElementById('regUseYn').value);
        fd.append('description', document.getElementById('regDescription').value);
        appendCsrf(fd);

        fetch('/auth/client', { method: 'POST', body: fd })
            .then(r => r.json())
            .then(data => {
                showToast(data.message, data.success);
                if (data.success) {
                    bootstrap.Modal.getInstance(document.getElementById('modalRegister')).hide();
                    document.getElementById('formRegister').reset();
                    loadTree();
                    if (data.clientOid) setTimeout(() => selectClient(data.clientOid), 300);
                }
            })
            .catch(() => showToast('등록 중 오류가 발생했습니다.', false));
    }

    // ── 수정 ─────────────────────────────────────────────────────
    function submitEdit(oid) {
        const name = document.getElementById('editClientName').value.trim();
        if (!name) { showToast('클라이언트명을 입력하세요.', false); return; }

        const fd = new FormData();
        fd.append('clientName',  name);
        fd.append('parentOid',   document.getElementById('editParentOid').value);
        fd.append('sortOrder',   document.getElementById('editSortOrder').value);
        fd.append('useYn',       document.getElementById('editUseYn').value);
        fd.append('description', document.getElementById('editDescription').value);
        appendCsrf(fd);

        fetch(`/auth/client/${oid}/update`, { method: 'POST', body: fd })
            .then(r => r.json())
            .then(data => {
                showToast(data.message, data.success);
                if (data.success) { loadTree(); }
            })
            .catch(() => showToast('수정 중 오류가 발생했습니다.', false));
    }

    // ── 삭제 ─────────────────────────────────────────────────────
    function deleteClient(oid) {
        if (!confirm('클라이언트를 삭제하시겠습니까?\n하위 클라이언트가 있으면 삭제가 제한될 수 있습니다.')) return;

        const fd = new FormData();
        appendCsrf(fd);

        fetch(`/auth/client/${oid}/delete`, { method: 'POST', body: fd })
            .then(r => r.json())
            .then(data => {
                showToast(data.message, data.success);
                if (data.success) {
                    selectedOid = null;
                    document.getElementById('clientDetail').innerHTML =
                        '<div style="text-align:center;padding:3rem 0;color:#9ca3af;">' +
                        '<i class="fas fa-hand-pointer" style="font-size:2rem;margin-bottom:.8rem;display:block;"></i>' +
                        '왼쪽 트리에서 클라이언트를 선택하면 상세 정보가 표시됩니다.</div>';
                    loadTree();
                }
            })
            .catch(() => showToast('삭제 중 오류가 발생했습니다.', false));
    }

    // ── 토스트 ────────────────────────────────────────────────────
    function showToast(msg, success) {
        const wrap  = document.getElementById('toast-wrap');
        const inner = document.getElementById('toast-inner');
        const icon  = document.getElementById('toast-icon');
        const msgEl = document.getElementById('toast-msg');

        inner.style.background = success ? '#16a34a' : '#dc2626';
        icon.className = success ? 'fas fa-circle-check' : 'fas fa-circle-xmark';
        msgEl.textContent = msg;
        wrap.style.display = 'block';
        setTimeout(() => { wrap.style.display = 'none'; }, 3000);
    }

    // ── CSRF ─────────────────────────────────────────────────────
    function appendCsrf(fd) {
        const meta = document.querySelector('meta[name="_csrf"]');
        const header = document.querySelector('meta[name="_csrf_header"]');
        if (meta && header) fd.append(meta.getAttribute('name'), meta.getAttribute('content'));
    }
</script>
</body>
</html>
