<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:replace="~{include/layout :: head('권한 관리')}"></head>
<body>

<header th:replace="~{include/header :: header}"></header>

<div class="app-body">
    <aside th:replace="~{include/sidebar :: sidebar}"></aside>

    <main class="app-content">

        <!-- 페이지 헤더 -->
        <div class="page-header">
            <div>
                <div class="breadcrumb-area">
                    <i class="fas fa-house"></i>
                    <i class="fas fa-chevron-right"></i>
                    <span>권한 관리</span>
                    <i class="fas fa-chevron-right"></i>
                    <span>권한 관리</span>
                </div>
                <h2 class="page-title">권한 관리</h2>
                <p class="page-subtitle">클라이언트별 권한을 계층 구조로 정의하고 관리합니다.</p>
            </div>
            <button type="button" class="btn-add-menu" id="btnOpenRegister"
                    onclick="openRegisterModal()" style="display:none;">
                <i class="fas fa-plus"></i> 권한 등록
            </button>
        </div>

        <!-- 토스트 알림 -->
        <div id="toast-wrap"
             style="position:fixed;top:1.2rem;right:1.4rem;z-index:9999;min-width:280px;display:none;">
            <div id="toast-inner"
                 style="padding:.75rem 1.1rem;border-radius:8px;color:#fff;
                        font-size:.88rem;font-weight:600;display:flex;align-items:center;gap:.6rem;
                        box-shadow:0 4px 12px rgba(0,0,0,.18);">
                <i id="toast-icon"></i>
                <span id="toast-msg"></span>
            </div>
        </div>

        <!-- 클라이언트 선택 바 -->
        <div class="card" style="margin-bottom:1rem;">
            <div class="card-body" style="padding:.8rem 1rem;display:flex;align-items:center;gap:1rem;">
                <label style="font-size:.88rem;font-weight:600;white-space:nowrap;">클라이언트 선택</label>
                <select id="clientSelect" class="modal-input" style="max-width:320px;" onchange="onClientChange()">
                    <option value="">— 클라이언트를 선택하세요 —</option>
                    <th:block th:each="c : ${clients}">
                        <option th:value="${c.clientOid}" th:text="${c.clientName + ' (' + c.clientCode + ')'}"></option>
                    </th:block>
                </select>
                <button type="button" class="btn btn-sm btn-outline-secondary" onclick="refreshTree()">
                    <i class="fas fa-rotate-right"></i> 새로고침
                </button>
            </div>
        </div>

        <!-- 2열 레이아웃 -->
        <div style="display:flex;gap:1.2rem;align-items:stretch;height:calc(100vh - 300px);">

            <!-- ── 왼쪽: 권한 트리 ────────────────────────────────────────── -->
            <div class="card" style="width:320px;flex-shrink:0;display:flex;flex-direction:column;overflow:hidden;">
                <div class="card-body" style="padding:1rem;display:flex;flex-direction:column;flex:1;min-height:0;">
                    <div style="font-size:.85rem;font-weight:700;color:#374151;margin-bottom:.6rem;flex-shrink:0;">
                        <i class="fas fa-shield-halved" style="margin-right:.4rem;color:#2563eb;"></i>권한 트리
                    </div>
                    <div style="position:relative;margin-bottom:.7rem;flex-shrink:0;">
                        <i class="fas fa-search" style="position:absolute;left:.6rem;top:50%;transform:translateY(-50%);color:#9ca3af;font-size:.8rem;pointer-events:none;"></i>
                        <input type="text" id="treeSearch"
                               placeholder="코드 또는 이름 검색"
                               oninput="filterTree()"
                               style="width:100%;padding:.38rem .7rem .38rem 1.9rem;font-size:.83rem;
                                      border:1px solid #d1d5db;border-radius:6px;outline:none;box-sizing:border-box;">
                        <button id="btnClearSearch" onclick="clearSearch()"
                                style="display:none;position:absolute;right:.5rem;top:50%;transform:translateY(-50%);
                                       background:none;border:none;cursor:pointer;color:#9ca3af;font-size:.75rem;padding:0;">
                            <i class="fas fa-times"></i>
                        </button>
                    </div>
                    <div id="searchResultInfo" style="display:none;font-size:.76rem;color:#6b7280;margin-bottom:.4rem;flex-shrink:0;"></div>
                    <div id="permTree" style="font-size:.88rem;line-height:1.6;overflow-y:auto;flex:1;min-height:0;padding-right:.2rem;">
                        <div style="color:#9ca3af;font-size:.83rem;padding:.5rem;">클라이언트를 선택하세요.</div>
                    </div>
                </div>
            </div>

            <!-- ── 오른쪽: 권한 상세 ───────────────────────────────────────── -->
            <div class="card" style="flex:1;display:flex;flex-direction:column;overflow:hidden;">
                <div class="card-body" id="permDetail"
                     style="padding:1.5rem;color:#9ca3af;font-size:.88rem;overflow-y:auto;flex:1;min-height:0;">
                    <div style="text-align:center;padding:3rem 0;">
                        <i class="fas fa-hand-pointer" style="font-size:2rem;margin-bottom:.8rem;display:block;"></i>
                        왼쪽 트리에서 권한을 선택하면 상세 정보가 표시됩니다.
                    </div>
                </div>
            </div>

        </div>
    </main>
</div>

<!-- ════════════════════════════════════════════════════════════════════════════
     모달: 권한 등록
     ════════════════════════════════════════════════════════════════════════════ -->
<div class="modal fade" id="modalRegister" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-lg modal-dialog-scrollable">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title"><i class="fas fa-plus-circle" style="margin-right:.5rem;"></i>권한 등록</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <form id="formRegister" novalidate>
                <div class="modal-body" style="padding:1.5rem;">
                    <input type="hidden" id="regClientOid" name="clientOid">
                    <div class="row g-3">
                        <div class="col-12">
                            <label class="form-label modal-label">클라이언트</label>
                            <input type="text" id="regClientLabel" class="modal-input w-100" readonly
                                   style="background:#f3f4f6;color:#374151;">
                        </div>
                        <div class="col-md-5">
                            <label class="form-label modal-label">권한 코드 <span style="color:#ef4444;">*</span></label>
                            <input type="text" id="regPermCode" name="permCode" class="modal-input w-100"
                                   placeholder="예: PERM_READ_REPORT" maxlength="100" style="text-transform:uppercase;">
                        </div>
                        <div class="col-md-7">
                            <label class="form-label modal-label">권한명 <span style="color:#ef4444;">*</span></label>
                            <input type="text" id="regPermName" name="permName" class="modal-input w-100"
                                   placeholder="권한명 입력" maxlength="100">
                        </div>
                        <div class="col-md-6">
                            <label class="form-label modal-label">상위 권한</label>
                            <select id="regParentOid" name="parentOid" class="modal-input w-100">
                                <option value="">— 최상위 —</option>
                            </select>
                        </div>
                        <div class="col-md-3">
                            <label class="form-label modal-label">정렬 순서</label>
                            <input type="number" id="regSortOrder" name="sortOrder" class="modal-input w-100" value="0" min="0">
                        </div>
                        <div class="col-md-3">
                            <label class="form-label modal-label">사용여부</label>
                            <select id="regUseYn" name="useYn" class="modal-input w-100">
                                <option value="Y">Y (사용)</option>
                                <option value="N">N (미사용)</option>
                            </select>
                        </div>
                        <div class="col-12">
                            <label class="form-label modal-label">설명</label>
                            <textarea id="regDescription" name="description" class="modal-input w-100"
                                      rows="2" maxlength="500" placeholder="권한 설명"></textarea>
                        </div>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary btn-sm" data-bs-dismiss="modal">닫기</button>
                    <button type="button" class="btn btn-primary btn-sm" onclick="submitRegister()">
                        <i class="fas fa-save"></i> 저장
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/js/common.js}"></script>
<script>
    let allPerms     = [];
    let selectedOid  = null;
    let currentClientOid   = null;
    let currentClientLabel = '';
    let searchKeyword = '';
    const collapsedSet = new Set(); // 접힌 노드 OID 집합

    // 페이지 로드 시 첫 번째 클라이언트 자동 선택
    document.addEventListener('DOMContentLoaded', () => {
        const sel = document.getElementById('clientSelect');
        if (sel && sel.options.length > 1) {
            sel.selectedIndex = 1;
            onClientChange();
        }
    });

    function onClientChange() {
        const sel = document.getElementById('clientSelect');
        currentClientOid = sel.value;
        currentClientLabel = sel.options[sel.selectedIndex].text;
        selectedOid = null;
        collapsedSet.clear();
        document.getElementById('permDetail').innerHTML =
            '<div style="text-align:center;padding:3rem 0;color:#9ca3af;">' +
            '<i class="fas fa-hand-pointer" style="font-size:2rem;margin-bottom:.8rem;display:block;"></i>' +
            '왼쪽 트리에서 권한을 선택하면 상세 정보가 표시됩니다.</div>';

        if (!currentClientOid) {
            document.getElementById('permTree').innerHTML = '<div style="color:#9ca3af;font-size:.83rem;padding:.5rem;">클라이언트를 선택하세요.</div>';
            document.getElementById('btnOpenRegister').style.display = 'none';
            return;
        }
        document.getElementById('btnOpenRegister').style.display = '';
        loadTree();
    }

    function refreshTree() {
        if (currentClientOid) loadTree();
    }

    function loadTree() {
        fetch(`/auth/permission/tree?clientOid=${currentClientOid}`)
            .then(r => r.json())
            .then(data => {
                allPerms = flattenTree(data);
                renderTree(buildRoots(allPerms));
                updateParentSelect(document.getElementById('regParentOid'), allPerms, null);
                if (selectedOid) {
                    const p = allPerms.find(p => p.permOid === selectedOid);
                    if (p) renderDetail(p);
                }
            })
            .catch(() => {
                document.getElementById('permTree').innerHTML =
                    '<div style="color:#ef4444;font-size:.83rem;padding:.5rem;">로드 실패</div>';
            });
    }

    function flattenTree(nodes, result = []) {
        nodes.forEach(n => {
            result.push(n);
            if (n.children && n.children.length > 0) flattenTree(n.children, result);
        });
        return result;
    }

    function buildRoots(flat) {
        const map = {};
        flat.forEach(p => { map[p.permOid] = { ...p, children: [] }; });
        const roots = [];
        flat.forEach(p => {
            if (p.parentOid && map[p.parentOid]) {
                map[p.parentOid].children.push(map[p.permOid]);
            } else {
                roots.push(map[p.permOid]);
            }
        });
        return roots;
    }

    function filterTree() {
        searchKeyword = document.getElementById('treeSearch').value.trim();
        document.getElementById('btnClearSearch').style.display = searchKeyword ? 'block' : 'none';
        renderTree(buildRoots(allPerms));
    }

    function clearSearch() {
        document.getElementById('treeSearch').value = '';
        searchKeyword = '';
        document.getElementById('btnClearSearch').style.display = 'none';
        document.getElementById('searchResultInfo').style.display = 'none';
        renderTree(buildRoots(allPerms));
    }

    function computeFilterInfo(flat, keyword) {
        if (!keyword) return null;
        const kw = keyword.toLowerCase();
        const matched = new Set(flat.filter(p =>
            p.permName.toLowerCase().includes(kw) || p.permCode.toLowerCase().includes(kw)
        ).map(p => p.permOid));

        const oidToParent = {};
        flat.forEach(p => { oidToParent[p.permOid] = p.parentOid; });
        const visible = new Set(matched);
        matched.forEach(oid => {
            let cur = oidToParent[oid];
            while (cur) { visible.add(cur); cur = oidToParent[cur]; }
        });
        return { matched, visible };
    }

    function highlight(text, keyword) {
        if (!keyword) return text;
        const kw = keyword.toLowerCase();
        const idx = text.toLowerCase().indexOf(kw);
        if (idx === -1) return text;
        return text.substring(0, idx)
            + `<mark style="background:#fef08a;padding:0;border-radius:2px;">${text.substring(idx, idx + keyword.length)}</mark>`
            + text.substring(idx + keyword.length);
    }

    function renderTree(roots) {
        const treeEl = document.getElementById('permTree');
        const infoEl = document.getElementById('searchResultInfo');
        const filterInfo = computeFilterInfo(allPerms, searchKeyword);

        if (filterInfo) {
            const cnt = filterInfo.matched.size;
            infoEl.style.display = 'block';
            infoEl.textContent = cnt > 0 ? `검색 결과: ${cnt}건` : '검색 결과가 없습니다.';
        } else {
            infoEl.style.display = 'none';
        }

        if (!roots || roots.length === 0) {
            treeEl.innerHTML = '<div style="color:#9ca3af;font-size:.83rem;padding:.5rem;">등록된 권한이 없습니다.</div>';
            return;
        }
        const html = buildTreeHtml(roots, 0, filterInfo);
        treeEl.innerHTML = html || '<div style="color:#9ca3af;font-size:.83rem;padding:.5rem;">검색 결과가 없습니다.</div>';
    }

    function buildTreeHtml(nodes, depth, filterInfo) {
        let html = '';
        const sorted = [...nodes].sort((a, b) => a.sortOrder - b.sortOrder);
        for (const node of sorted) {
            if (filterInfo && !filterInfo.visible.has(node.permOid)) continue;

            const hasChildren = node.children && node.children.length > 0;
            const isDisabled  = node.useYn !== 'Y';
            const isMatched   = filterInfo ? filterInfo.matched.has(node.permOid) : false;
            const isSelected  = node.permOid === selectedOid;
            const isCollapsed = !filterInfo && collapsedSet.has(node.permOid);
            const indent      = depth * 16;

            let labelStyle = `cursor:pointer;padding:.28rem .5rem;border-radius:6px;display:flex;align-items:center;gap:.4rem;`;
            if (isSelected) labelStyle += 'background:#eff6ff;font-weight:700;';
            if (isDisabled) labelStyle += 'color:#f59e0b;';
            if (isMatched && !isSelected) labelStyle += 'border-left:3px solid #2563eb;padding-left:.35rem;';

            let badge = isDisabled
                ? '<span style="font-size:.7rem;background:#fef3c7;color:#b45309;padding:1px 5px;border-radius:4px;margin-left:.3rem;">미사용</span>'
                : '';

            const icon = hasChildren ? (isCollapsed ? 'fa-shield-halved' : 'fa-shield') : 'fa-key';
            const iconColor = isDisabled ? '#f59e0b' : '#2563eb';
            const nameHtml = highlight(node.permName, searchKeyword);
            const codeHtml = highlight(node.permCode, searchKeyword);

            const toggleBtn = hasChildren
                ? `<i class="fas fa-chevron-${isCollapsed ? 'right' : 'down'}"
                      onclick="event.stopPropagation();togglePermNode('${node.permOid}')"
                      style="font-size:.62rem;color:#6b7280;width:10px;flex-shrink:0;cursor:pointer;"></i>`
                : `<span style="display:inline-block;width:10px;flex-shrink:0;"></span>`;

            html += `<div style="margin-left:${indent}px;">
                <div style="${labelStyle}" onclick="selectPerm('${node.permOid}')">
                    ${toggleBtn}
                    <i class="fas ${icon}" style="color:${iconColor};font-size:.8rem;width:14px;flex-shrink:0;"></i>
                    <span>${nameHtml}</span>
                    <span style="font-size:.75rem;color:#9ca3af;">(${codeHtml})</span>
                    ${badge}
                </div>`;
            if (hasChildren) {
                html += `<div id="pchildren_${node.permOid}" style="${isCollapsed ? 'display:none;' : ''}">`;
                html += buildTreeHtml(node.children, depth + 1, filterInfo);
                html += '</div>';
            }
            html += '</div>';
        }
        return html;
    }

    function togglePermNode(permOid) {
        if (collapsedSet.has(permOid)) {
            collapsedSet.delete(permOid);
        } else {
            collapsedSet.add(permOid);
        }
        renderTree(buildRoots(allPerms));
    }

    function selectPerm(oid) {
        selectedOid = oid;
        const p = allPerms.find(p => p.permOid === oid);
        if (!p) return;
        renderDetail(p);
        renderTree(buildRoots(allPerms));
    }

    function getParentName(parentOid) {
        if (!parentOid) return '—';
        const p = allPerms.find(p => p.permOid === parentOid);
        return p ? `${p.permName} (${p.permCode})` : parentOid;
    }

    function formatDate(dt) {
        if (!dt) return '—';
        return dt.replace('T', ' ').substring(0, 16);
    }

    function renderDetail(p) {
        const rows = [
            ['권한 OID',  p.permOid],
            ['권한 코드', p.permCode],
            ['권한명',    p.permName],
            ['상위 권한', getParentName(p.parentOid)],
            ['설명',      p.description || '—'],
            ['정렬 순서', p.sortOrder],
            ['사용여부', p.useYn === 'Y'
                ? '<span class="badge bg-success">Y</span>'
                : '<span class="badge bg-warning text-dark">N</span>'],
            ['생성 일시', formatDate(p.createdAt) + (p.createdBy ? ` (${p.createdBy})` : '')],
            ['수정 일시', formatDate(p.updatedAt) + (p.updatedBy ? ` (${p.updatedBy})` : '')],
        ];

        let tableHtml = rows.map(([k, v]) =>
            `<tr>
               <td style="width:110px;font-weight:600;color:#6b7280;font-size:.82rem;padding:.45rem .8rem;">${k}</td>
               <td style="font-size:.88rem;padding:.45rem .8rem;">${v}</td>
             </tr>`
        ).join('');

        document.getElementById('permDetail').innerHTML = `
            <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:1rem;">
                <h5 style="margin:0;font-size:1rem;font-weight:700;">${p.permName}</h5>
                <div style="display:flex;gap:.5rem;">
                    <button type="button" class="btn btn-outline-primary btn-sm" onclick="openEditPanel()">
                        <i class="fas fa-pen"></i> 수정
                    </button>
                    <button type="button" class="btn btn-outline-danger btn-sm" onclick="deletePerm('${p.permOid}')">
                        <i class="fas fa-trash"></i> 삭제
                    </button>
                </div>
            </div>
            <table class="table table-sm table-borderless" style="margin:0;">${tableHtml}</table>
            <div id="editPanel" style="display:none;margin-top:1.5rem;border-top:1px solid #e5e7eb;padding-top:1.2rem;">
                <h6 style="font-size:.9rem;font-weight:700;margin-bottom:1rem;">정보 수정</h6>
                <div class="row g-3">
                    <div class="col-md-5">
                        <label class="form-label modal-label">권한 코드</label>
                        <input type="text" class="modal-input w-100" readonly
                               style="background:#f3f4f6;color:#6b7280;" value="${p.permCode}">
                    </div>
                    <div class="col-md-7">
                        <label class="form-label modal-label">권한명 <span style="color:#ef4444;">*</span></label>
                        <input type="text" id="editPermName" class="modal-input w-100" value="${p.permName}" maxlength="100">
                    </div>
                    <div class="col-md-6">
                        <label class="form-label modal-label">상위 권한</label>
                        <select id="editParentOid" class="modal-input w-100"></select>
                    </div>
                    <div class="col-md-3">
                        <label class="form-label modal-label">정렬 순서</label>
                        <input type="number" id="editSortOrder" class="modal-input w-100" value="${p.sortOrder}" min="0">
                    </div>
                    <div class="col-md-3">
                        <label class="form-label modal-label">사용여부</label>
                        <select id="editUseYn" class="modal-input w-100">
                            <option value="Y" ${p.useYn === 'Y' ? 'selected' : ''}>Y (사용)</option>
                            <option value="N" ${p.useYn === 'N' ? 'selected' : ''}>N (미사용)</option>
                        </select>
                    </div>
                    <div class="col-12">
                        <label class="form-label modal-label">설명</label>
                        <textarea id="editDescription" class="modal-input w-100" rows="2" maxlength="500">${p.description || ''}</textarea>
                    </div>
                    <div class="col-12 text-end">
                        <button type="button" class="btn btn-secondary btn-sm me-1" onclick="closeEditPanel()">취소</button>
                        <button type="button" class="btn btn-primary btn-sm" onclick="submitEdit('${p.permOid}')">
                            <i class="fas fa-save"></i> 저장
                        </button>
                    </div>
                </div>
            </div>`;

        updateParentSelect(document.getElementById('editParentOid'), allPerms, p.permOid);
        const editParent = document.getElementById('editParentOid');
        if (editParent) editParent.value = p.parentOid || '';
    }

    function openEditPanel()  { document.getElementById('editPanel').style.display = 'block'; }
    function closeEditPanel() { document.getElementById('editPanel').style.display = 'none'; }

    function updateParentSelect(sel, flat, excludeOid) {
        if (!sel) return;
        sel.innerHTML = '<option value="">— 최상위 —</option>';
        flat.forEach(p => {
            if (p.permOid === excludeOid) return;
            const opt = document.createElement('option');
            opt.value = p.permOid;
            opt.textContent = `${p.permName} (${p.permCode})`;
            sel.appendChild(opt);
        });
    }

    function openRegisterModal() {
        if (!currentClientOid) { showToast('클라이언트를 먼저 선택하세요.', false); return; }
        document.getElementById('regClientOid').value   = currentClientOid;
        document.getElementById('regClientLabel').value = currentClientLabel;
        updateParentSelect(document.getElementById('regParentOid'), allPerms, null);
        document.getElementById('formRegister').reset();
        document.getElementById('regClientOid').value   = currentClientOid;
        document.getElementById('regClientLabel').value = currentClientLabel;
        new bootstrap.Modal(document.getElementById('modalRegister')).show();
    }

    function submitRegister() {
        const code = document.getElementById('regPermCode').value.trim();
        const name = document.getElementById('regPermName').value.trim();
        if (!code) { showToast('권한 코드를 입력하세요.', false); return; }
        if (!name) { showToast('권한명을 입력하세요.', false); return; }

        const fd = new FormData();
        fd.append('clientOid',   currentClientOid);
        fd.append('permCode',    code.toUpperCase());
        fd.append('permName',    name);
        fd.append('parentOid',   document.getElementById('regParentOid').value);
        fd.append('sortOrder',   document.getElementById('regSortOrder').value);
        fd.append('useYn',       document.getElementById('regUseYn').value);
        fd.append('description', document.getElementById('regDescription').value);
        appendCsrf(fd);

        fetch('/auth/permission', { method: 'POST', body: fd })
            .then(r => r.json())
            .then(data => {
                showToast(data.message, data.success);
                if (data.success) {
                    bootstrap.Modal.getInstance(document.getElementById('modalRegister')).hide();
                    loadTree();
                    if (data.permOid) setTimeout(() => selectPerm(data.permOid), 300);
                }
            })
            .catch(() => showToast('등록 중 오류가 발생했습니다.', false));
    }

    function submitEdit(oid) {
        const name = document.getElementById('editPermName').value.trim();
        if (!name) { showToast('권한명을 입력하세요.', false); return; }

        const fd = new FormData();
        fd.append('permName',    name);
        fd.append('parentOid',   document.getElementById('editParentOid').value);
        fd.append('sortOrder',   document.getElementById('editSortOrder').value);
        fd.append('useYn',       document.getElementById('editUseYn').value);
        fd.append('description', document.getElementById('editDescription').value);
        appendCsrf(fd);

        fetch(`/auth/permission/${oid}/update`, { method: 'POST', body: fd })
            .then(r => r.json())
            .then(data => {
                showToast(data.message, data.success);
                if (data.success) loadTree();
            })
            .catch(() => showToast('수정 중 오류가 발생했습니다.', false));
    }

    function deletePerm(oid) {
        if (!confirm('권한을 삭제하시겠습니까?')) return;

        const fd = new FormData();
        appendCsrf(fd);

        fetch(`/auth/permission/${oid}/delete`, { method: 'POST', body: fd })
            .then(r => r.json())
            .then(data => {
                showToast(data.message, data.success);
                if (data.success) {
                    selectedOid = null;
                    document.getElementById('permDetail').innerHTML =
                        '<div style="text-align:center;padding:3rem 0;color:#9ca3af;">' +
                        '<i class="fas fa-hand-pointer" style="font-size:2rem;margin-bottom:.8rem;display:block;"></i>' +
                        '왼쪽 트리에서 권한을 선택하면 상세 정보가 표시됩니다.</div>';
                    loadTree();
                }
            })
            .catch(() => showToast('삭제 중 오류가 발생했습니다.', false));
    }

    function showToast(msg, success) {
        const wrap  = document.getElementById('toast-wrap');
        const inner = document.getElementById('toast-inner');
        const icon  = document.getElementById('toast-icon');
        const msgEl = document.getElementById('toast-msg');
        inner.style.background = success ? '#16a34a' : '#dc2626';
        icon.className = success ? 'fas fa-circle-check' : 'fas fa-circle-xmark';
        msgEl.textContent = msg;
        wrap.style.display = 'block';
        setTimeout(() => { wrap.style.display = 'none'; }, 3000);
    }

    function appendCsrf(fd) {
        const meta = document.querySelector('meta[name="_csrf"]');
        if (meta) fd.append(meta.getAttribute('name'), meta.getAttribute('content'));
    }
</script>
</body>
</html>
