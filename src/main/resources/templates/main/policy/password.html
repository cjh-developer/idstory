<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:replace="~{include/layout :: head('비밀번호 정책')}"></head>
<body>

<header th:replace="~{include/header :: header}"></header>

<div class="app-body">
    <aside th:replace="~{include/sidebar :: sidebar}"></aside>

    <main class="app-content">

        <!-- 페이지 헤더 -->
        <div class="page-header">
            <div>
                <div class="breadcrumb-area">
                    <i class="fas fa-house"></i>
                    <i class="fas fa-chevron-right"></i>
                    <span>정책 관리</span>
                    <i class="fas fa-chevron-right"></i>
                    <span>비밀번호 정책</span>
                </div>
                <h2 class="page-title">비밀번호 정책</h2>
                <p class="page-subtitle">비밀번호 관련 보안 정책을 설정합니다.</p>
            </div>
        </div>

        <!-- 알림 -->
        <div th:if="${successMsg}" class="alert alert-success" style="margin-bottom:1rem;">
            <i class="fas fa-circle-check"></i>
            <span th:text="${successMsg}"></span>
        </div>
        <div th:if="${errorMsg}" class="alert alert-danger" style="margin-bottom:1rem;">
            <i class="fas fa-circle-exclamation"></i>
            <span th:text="${errorMsg}"></span>
        </div>

        <!-- 잠금 현황 요약 -->
        <div class="card" style="margin-bottom:1rem;">
            <div class="card-body" style="display:flex;align-items:center;gap:2rem;padding:1rem 1.5rem;">
                <div style="display:flex;align-items:center;gap:.6rem;">
                    <span style="width:36px;height:36px;background:#ffedd5;border-radius:10px;display:flex;align-items:center;justify-content:center;">
                        <i class="fas fa-lock" style="color:#c2410c;font-size:.95rem;"></i>
                    </span>
                    <div>
                        <div style="font-size:.78rem;color:var(--gray-400);">현재 잠금 계정</div>
                        <div style="font-size:1.3rem;font-weight:700;color:#c2410c;"
                             th:text="${lockedUserCount} + '명'">0명</div>
                    </div>
                </div>
                <div style="color:var(--gray-300);">|</div>
                <div style="font-size:.85rem;color:var(--gray-500);">
                    <i class="fas fa-circle-info" style="margin-right:.3rem;color:var(--blue-400);"></i>
                    잠금된 계정은 사용자 목록에서 확인하고 관리자가 직접 해제할 수 있습니다.
                </div>
            </div>
        </div>

        <!-- 정책 설정 카드 -->
        <div class="card">
            <div class="card-header">
                <span class="card-title">
                    <i class="fas fa-shield-halved"></i> 로그인 실패 잠금 정책
                </span>
            </div>
            <div class="card-body">
                <form th:action="@{/policy/password}" method="post" style="max-width:520px;">

                    <table style="width:100%;border-collapse:collapse;">
                        <thead>
                        <tr style="background:var(--gray-50);border-bottom:1px solid var(--gray-100);">
                            <th style="padding:.7rem 1rem;text-align:left;font-size:.82rem;color:var(--gray-500);font-weight:600;width:40%;">정책 항목</th>
                            <th style="padding:.7rem 1rem;text-align:left;font-size:.82rem;color:var(--gray-500);font-weight:600;">설정 값</th>
                            <th style="padding:.7rem 1rem;text-align:left;font-size:.82rem;color:var(--gray-500);font-weight:600;">설명</th>
                        </tr>
                        </thead>
                        <tbody>
                        <tr style="border-bottom:1px solid var(--gray-100);">
                            <td style="padding:.9rem 1rem;font-weight:600;font-size:.9rem;">
                                최대 로그인 실패 횟수
                            </td>
                            <td style="padding:.9rem 1rem;">
                                <div style="display:flex;align-items:center;gap:.5rem;">
                                    <input type="number"
                                           name="maxLoginFailCount"
                                           th:value="${maxLoginFailCount}"
                                           min="1" max="99"
                                           class="modal-input"
                                           style="width:80px;text-align:center;"
                                           required/>
                                    <span style="font-size:.88rem;color:var(--gray-500);">회</span>
                                </div>
                            </td>
                            <td style="padding:.9rem 1rem;font-size:.83rem;color:var(--gray-400);">
                                연속 실패 시 계정 자동 잠금<br/>
                                <span style="color:var(--amber-600);">
                                    <i class="fas fa-triangle-exclamation"></i>
                                    변경 시 즉시 적용됩니다
                                </span>
                            </td>
                        </tr>
                        </tbody>
                    </table>

                    <div style="margin-top:1.5rem;display:flex;gap:.8rem;">
                        <button type="submit" class="btn-modal-save">
                            <i class="fas fa-floppy-disk"></i> 저장
                        </button>
                    </div>

                </form>
            </div>
        </div>

    </main>
</div>

<footer th:replace="~{include/footer :: footer}"></footer>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/js/common.js}"></script>

</body>
</html>
