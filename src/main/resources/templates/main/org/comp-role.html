<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:replace="~{include/layout :: head('직책 관리')}"></head>
<body>

<header th:replace="~{include/header :: header}"></header>

<div class="app-body">
    <aside th:replace="~{include/sidebar :: sidebar}"></aside>

    <main class="app-content">

        <!-- 페이지 헤더 -->
        <div class="page-header">
            <div>
                <div class="breadcrumb-area">
                    <i class="fas fa-house"></i>
                    <i class="fas fa-chevron-right"></i>
                    <span>조직 관리</span>
                    <i class="fas fa-chevron-right"></i>
                    <span>직책 관리</span>
                </div>
                <h2 class="page-title">직책 관리</h2>
                <p class="page-subtitle">직책을 등록하고 관리합니다.</p>
            </div>
            <button type="button" class="btn-add-menu" onclick="openRegisterModal()">
                <i class="fas fa-plus"></i> 직책 등록
            </button>
        </div>

        <!-- 토스트 알림 -->
        <div id="toast-wrap" style="position:fixed;top:1.2rem;right:1.4rem;z-index:9999;min-width:280px;display:none;">
            <div id="toast-inner"
                 style="padding:.75rem 1.1rem;border-radius:8px;color:#fff;font-size:.88rem;font-weight:600;
                        display:flex;align-items:center;gap:.6rem;box-shadow:0 4px 12px rgba(0,0,0,.18);">
                <i id="toast-icon"></i><span id="toast-msg"></span>
            </div>
        </div>

        <!-- 검색 카드 -->
        <div class="card" style="margin-bottom:1rem;">
            <div class="card-body">
                <div style="display:flex;flex-wrap:wrap;gap:.8rem;align-items:flex-end;">

                    <div>
                        <label style="display:block;font-size:.82rem;font-weight:600;margin-bottom:.3rem;">직책코드</label>
                        <input type="text" id="srchCode" class="modal-input"
                               placeholder="직책코드 검색" style="width:160px;"
                               onkeydown="if(event.key==='Enter') doSearch()">
                    </div>

                    <div>
                        <label style="display:block;font-size:.82rem;font-weight:600;margin-bottom:.3rem;">직책명</label>
                        <input type="text" id="srchName" class="modal-input"
                               placeholder="직책명 검색" style="width:180px;"
                               onkeydown="if(event.key==='Enter') doSearch()">
                    </div>

                    <div>
                        <label style="display:block;font-size:.82rem;font-weight:600;margin-bottom:.3rem;">사용 여부</label>
                        <select id="srchUseYn" class="modal-input" style="width:100px;">
                            <option value="">전체</option>
                            <option value="Y">사용</option>
                            <option value="N">미사용</option>
                        </select>
                    </div>

                    <div style="display:flex;align-items:center;gap:.4rem;padding-bottom:.15rem;">
                        <label style="display:flex;align-items:center;gap:.4rem;font-size:.88rem;cursor:pointer;">
                            <input type="checkbox" id="srchIncludeDeleted"> 삭제 포함
                        </label>
                    </div>

                    <div style="display:flex;gap:.5rem;">
                        <button type="button" class="btn-modal-save" style="padding:.42rem 1rem;" onclick="doSearch()">
                            <i class="fas fa-magnifying-glass"></i> 검색
                        </button>
                        <button type="button" class="btn-modal-cancel" style="padding:.42rem 1rem;" onclick="resetSearch()">
                            초기화
                        </button>
                    </div>

                </div>
            </div>
        </div>

        <!-- 결과 카드 -->
        <div class="card">
            <div class="card-header" style="display:flex;justify-content:space-between;align-items:center;">
                <span class="card-title"><i class="fas fa-list-ul"></i> 직책 목록</span>
                <span id="totalCount" style="font-size:.78rem;color:var(--gray-400);">총 0건</span>
            </div>
            <div class="card-body" style="padding:0;">
                <div class="menu-table-wrap">
                    <table class="menu-table">
                        <thead>
                        <tr>
                            <th style="width:50px;">No.</th>
                            <th style="width:120px;">직책코드</th>
                            <th style="width:150px;">직책명</th>
                            <th>직책 상세</th>
                            <th style="width:80px;">정렬순서</th>
                            <th style="width:80px;">사용여부</th>
                            <th style="width:110px;">등록일</th>
                            <th style="width:130px;">관리</th>
                        </tr>
                        </thead>
                        <tbody id="compRoleTableBody">
                        <tr>
                            <td colspan="8" class="cell-empty">
                                <i class="fas fa-magnifying-glass" style="margin-right:.4rem;"></i>
                                검색 조건을 입력하고 조회하세요.
                            </td>
                        </tr>
                        </tbody>
                    </table>
                </div>
            </div>
            <!-- 페이징 -->
            <div id="pagination" style="display:flex;justify-content:center;padding:.8rem;"></div>
        </div>

    </main>
</div>

<!-- ════════════════════════════════════════════════════════
     모달: 직책 등록
     ════════════════════════════════════════════════════════ -->
<div class="modal fade" id="modalRegister" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-scrollable" style="max-width:520px;">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">
                    <i class="fas fa-plus-circle" style="margin-right:.5rem;color:#2563eb;"></i>직책 등록
                </h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <form id="formRegister" novalidate
                  style="display:flex;flex-direction:column;flex:1;min-height:0;overflow:hidden;">
                <div class="modal-body" style="padding:1.5rem;overflow-y:auto;">

                    <div id="regError"
                         style="display:none;background:#fef2f2;border:1px solid #fecaca;border-radius:6px;
                                padding:.65rem 1rem;color:#dc2626;font-size:.84rem;margin-bottom:1rem;"></div>

                    <div style="display:grid;grid-template-columns:1fr 1fr;gap:1rem;">

                        <div>
                            <label class="form-label modal-label">직책코드 <span style="color:#ef4444;">*</span></label>
                            <input type="text" id="regCode" class="modal-input w-100"
                                   placeholder="예: R1" maxlength="20"
                                   style="text-transform:uppercase;">
                        </div>

                        <div>
                            <label class="form-label modal-label">직책명 <span style="color:#ef4444;">*</span></label>
                            <input type="text" id="regName" class="modal-input w-100"
                                   placeholder="예: 팀장" maxlength="100">
                        </div>

                        <div style="grid-column:1/-1;">
                            <label class="form-label modal-label">직책 상세</label>
                            <textarea id="regDesc" class="modal-input w-100"
                                      placeholder="직책 설명 (선택)" maxlength="500"
                                      style="height:80px;resize:vertical;"></textarea>
                        </div>

                        <div>
                            <label class="form-label modal-label">정렬 순서</label>
                            <input type="number" id="regSortOrder" class="modal-input w-100"
                                   value="0" min="0">
                        </div>

                        <div>
                            <label class="form-label modal-label">사용 여부</label>
                            <select id="regUseYn" class="modal-input w-100">
                                <option value="Y">Y (사용)</option>
                                <option value="N">N (미사용)</option>
                            </select>
                        </div>

                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary btn-sm" data-bs-dismiss="modal">닫기</button>
                    <button type="button" class="btn btn-primary btn-sm" onclick="submitRegister()">
                        <i class="fas fa-save"></i> 저장
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>

<!-- ════════════════════════════════════════════════════════
     모달: 직책 수정
     ════════════════════════════════════════════════════════ -->
<div class="modal fade" id="modalEdit" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-scrollable" style="max-width:520px;">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">
                    <i class="fas fa-pen" style="margin-right:.5rem;color:#2563eb;"></i>직책 수정
                </h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <form id="formEdit" novalidate
                  style="display:flex;flex-direction:column;flex:1;min-height:0;overflow:hidden;">
                <input type="hidden" id="editOid">
                <div class="modal-body" style="padding:1.5rem;overflow-y:auto;">

                    <div id="editError"
                         style="display:none;background:#fef2f2;border:1px solid #fecaca;border-radius:6px;
                                padding:.65rem 1rem;color:#dc2626;font-size:.84rem;margin-bottom:1rem;"></div>

                    <div style="display:grid;grid-template-columns:1fr 1fr;gap:1rem;">

                        <div>
                            <label class="form-label modal-label">직책코드</label>
                            <input type="text" id="editCode" class="modal-input w-100" readonly
                                   style="background:#f9fafb;color:#6b7280;">
                        </div>

                        <div>
                            <label class="form-label modal-label">직책명 <span style="color:#ef4444;">*</span></label>
                            <input type="text" id="editName" class="modal-input w-100"
                                   placeholder="직책명" maxlength="100">
                        </div>

                        <div style="grid-column:1/-1;">
                            <label class="form-label modal-label">직책 상세</label>
                            <textarea id="editDesc" class="modal-input w-100"
                                      placeholder="직책 설명 (선택)" maxlength="500"
                                      style="height:80px;resize:vertical;"></textarea>
                        </div>

                        <div>
                            <label class="form-label modal-label">정렬 순서</label>
                            <input type="number" id="editSortOrder" class="modal-input w-100" min="0">
                        </div>

                        <div>
                            <label class="form-label modal-label">사용 여부</label>
                            <select id="editUseYn" class="modal-input w-100">
                                <option value="Y">Y (사용)</option>
                                <option value="N">N (미사용)</option>
                            </select>
                        </div>

                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary btn-sm" data-bs-dismiss="modal">닫기</button>
                    <button type="button" class="btn btn-primary btn-sm" onclick="submitEdit()">
                        <i class="fas fa-save"></i> 저장
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>

<!-- ════════════════════════════════════════════════════════
     JavaScript
     ════════════════════════════════════════════════════════ -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/js/common.js}"></script>
<script th:inline="javascript">

    let currentPage = 0;

    // ── 초기 로드 ────────────────────────────────────────────────
    document.addEventListener('DOMContentLoaded', () => doSearch());

    // ── 검색 ─────────────────────────────────────────────────────
    function doSearch(page) {
        currentPage = page || 0;
        const params = new URLSearchParams({
            compRoleCode:   document.getElementById('srchCode').value.trim(),
            compRoleName:   document.getElementById('srchName').value.trim(),
            useYn:          document.getElementById('srchUseYn').value,
            includeDeleted: document.getElementById('srchIncludeDeleted').checked,
            page:           currentPage
        });
        fetch(`/org/api/comp-roles?${params}`)
            .then(r => r.json())
            .then(renderTable)
            .catch(() => showToast('조회 중 오류가 발생했습니다.', false));
    }

    function resetSearch() {
        document.getElementById('srchCode').value             = '';
        document.getElementById('srchName').value             = '';
        document.getElementById('srchUseYn').value            = '';
        document.getElementById('srchIncludeDeleted').checked = false;
        doSearch();
    }

    // ── 테이블 렌더링 ─────────────────────────────────────────────
    function renderTable(data) {
        const tbody      = document.getElementById('compRoleTableBody');
        const pagination = document.getElementById('pagination');
        const totalCount = document.getElementById('totalCount');

        totalCount.textContent = `총 ${data.totalElements}건`;

        const rows   = data.content;
        const offset = currentPage * data.pageSize;

        if (rows.length === 0) {
            tbody.innerHTML = `<tr><td colspan="8" class="cell-empty">
                <i class="fas fa-inbox" style="margin-right:.4rem;"></i>조회된 직책이 없습니다.</td></tr>`;
            pagination.innerHTML = '';
            return;
        }

        tbody.innerHTML = rows.map((r, i) => {
            const isDeleted  = !!r.deletedAt;
            const rowStyle   = isDeleted ? 'color:#d1d5db;text-decoration:line-through;' : '';
            const useYnBadge = r.useYn === 'Y'
                ? '<span class="role-badge" style="background:#dcfce7;color:#15803d;">사용</span>'
                : '<span class="role-badge" style="background:#f3f4f6;color:#6b7280;">미사용</span>';
            const deletedBadge = isDeleted
                ? '<span class="role-badge" style="background:#fee2e2;color:#dc2626;margin-left:.3rem;">삭제됨</span>'
                : '';
            const createdAt = r.createdAt ? r.createdAt.substring(0, 10) : '—';

            const actionBtns = isDeleted
                ? '<span style="font-size:.8rem;color:#d1d5db;">—</span>'
                : `<button class="btn btn-xs btn-outline-secondary" style="font-size:.75rem;padding:2px 8px;margin-right:3px;"
                          onclick="openEditModal('${r.compRoleOid}')">
                       <i class="fas fa-pen"></i> 수정
                   </button>
                   <button class="btn btn-xs btn-outline-danger" style="font-size:.75rem;padding:2px 8px;"
                           onclick="deleteCompRole('${r.compRoleOid}','${r.compRoleName}')">
                       <i class="fas fa-trash"></i> 삭제
                   </button>`;

            return `<tr style="${rowStyle}">
                <td class="cell-center" style="color:var(--gray-400);font-size:.82rem;">${offset + i + 1}</td>
                <td style="font-weight:600;font-size:.88rem;">${r.compRoleCode}</td>
                <td>${r.compRoleName}${deletedBadge}</td>
                <td style="font-size:.84rem;color:#6b7280;">${r.compRoleDesc || '—'}</td>
                <td class="cell-center" style="font-size:.84rem;">${r.sortOrder}</td>
                <td class="cell-center">${useYnBadge}</td>
                <td style="font-size:.82rem;">${createdAt}</td>
                <td class="cell-center" style="white-space:nowrap;">${actionBtns}</td>
            </tr>`;
        }).join('');

        pagination.innerHTML = buildPagination(currentPage, data.totalPages);
    }

    // ── 페이징 ────────────────────────────────────────────────────
    function buildPagination(cur, total) {
        if (total <= 1) return '';
        const btnBase = 'style="padding:.25rem .55rem;font-size:.78rem;min-width:28px;border:1px solid #d1d5db;border-radius:5px;cursor:pointer;background:#fff;color:#374151;"';
        const btnAct  = 'style="padding:.25rem .55rem;font-size:.78rem;min-width:28px;border:1px solid #2563eb;border-radius:5px;background:#2563eb;color:#fff;font-weight:700;"';
        const btnDis  = 'style="padding:.25rem .55rem;font-size:.78rem;min-width:28px;border:1px solid #e5e7eb;border-radius:5px;background:#f9fafb;color:#d1d5db;cursor:default;"';
        let html = '<div style="display:flex;justify-content:center;align-items:center;gap:.3rem;">';
        html += cur > 0
            ? `<button ${btnBase} onclick="doSearch(${cur-1})"><i class="fas fa-chevron-left"></i></button>`
            : `<button ${btnDis} disabled><i class="fas fa-chevron-left"></i></button>`;
        const start = Math.max(0, cur - 2);
        const end   = Math.min(total - 1, cur + 2);
        if (start > 0) html += `<button ${btnBase} onclick="doSearch(0)">1</button>${start > 1 ? '<span style="color:#9ca3af;padding:0 .2rem;">…</span>' : ''}`;
        for (let i = start; i <= end; i++) {
            html += i === cur ? `<button ${btnAct}>${i+1}</button>` : `<button ${btnBase} onclick="doSearch(${i})">${i+1}</button>`;
        }
        if (end < total - 1) html += `${end < total - 2 ? '<span style="color:#9ca3af;padding:0 .2rem;">…</span>' : ''}<button ${btnBase} onclick="doSearch(${total-1})">${total}</button>`;
        html += cur < total - 1
            ? `<button ${btnBase} onclick="doSearch(${cur+1})"><i class="fas fa-chevron-right"></i></button>`
            : `<button ${btnDis} disabled><i class="fas fa-chevron-right"></i></button>`;
        html += '</div>';
        return html;
    }

    // ── 등록 모달 ─────────────────────────────────────────────────
    function openRegisterModal() {
        document.getElementById('regCode').value      = '';
        document.getElementById('regName').value      = '';
        document.getElementById('regDesc').value      = '';
        document.getElementById('regSortOrder').value = '0';
        document.getElementById('regUseYn').value     = 'Y';
        document.getElementById('regError').style.display = 'none';
        new bootstrap.Modal(document.getElementById('modalRegister')).show();
    }

    function submitRegister() {
        const code = document.getElementById('regCode').value.trim();
        const name = document.getElementById('regName').value.trim();
        if (!code) { showError('regError', '직책코드를 입력하세요.'); return; }
        if (!name) { showError('regError', '직책명을 입력하세요.'); return; }

        const form = new FormData();
        form.append('compRoleCode', code.toUpperCase());
        form.append('compRoleName', name);
        form.append('compRoleDesc', document.getElementById('regDesc').value.trim());
        form.append('sortOrder',    document.getElementById('regSortOrder').value);
        form.append('useYn',        document.getElementById('regUseYn').value);
        appendCsrf(form);

        fetch('/org/api/comp-roles/register', { method: 'POST', body: form })
            .then(r => r.json())
            .then(data => {
                if (data.success) {
                    bootstrap.Modal.getInstance(document.getElementById('modalRegister'))?.hide();
                    showToast('직책이 등록되었습니다.', true);
                    doSearch(currentPage);
                } else {
                    showError('regError', data.message || '등록 실패');
                }
            });
    }

    // ── 수정 모달 ─────────────────────────────────────────────────
    function openEditModal(compRoleOid) {
        fetch(`/org/api/comp-roles/${compRoleOid}`)
            .then(r => r.json())
            .then(r => {
                document.getElementById('editOid').value       = r.compRoleOid;
                document.getElementById('editCode').value      = r.compRoleCode;
                document.getElementById('editName').value      = r.compRoleName;
                document.getElementById('editDesc').value      = r.compRoleDesc || '';
                document.getElementById('editSortOrder').value = r.sortOrder;
                document.getElementById('editUseYn').value     = r.useYn;
                document.getElementById('editError').style.display = 'none';
                new bootstrap.Modal(document.getElementById('modalEdit')).show();
            });
    }

    function submitEdit() {
        const oid  = document.getElementById('editOid').value;
        const name = document.getElementById('editName').value.trim();
        if (!name) { showError('editError', '직책명을 입력하세요.'); return; }

        const form = new FormData();
        form.append('compRoleName', name);
        form.append('compRoleDesc', document.getElementById('editDesc').value.trim());
        form.append('sortOrder',    document.getElementById('editSortOrder').value);
        form.append('useYn',        document.getElementById('editUseYn').value);
        appendCsrf(form);

        fetch(`/org/api/comp-roles/${oid}/update`, { method: 'POST', body: form })
            .then(r => r.json())
            .then(data => {
                if (data.success) {
                    bootstrap.Modal.getInstance(document.getElementById('modalEdit'))?.hide();
                    showToast('직책 정보가 수정되었습니다.', true);
                    doSearch(currentPage);
                } else {
                    showError('editError', data.message || '수정 실패');
                }
            });
    }

    // ── 삭제 ──────────────────────────────────────────────────────
    function deleteCompRole(compRoleOid, compRoleName) {
        if (!confirm(`"${compRoleName}" 직책을 삭제하시겠습니까?\n삭제 후 목록에서 [삭제 포함] 체크 시 조회됩니다.`)) return;
        const form = new FormData();
        appendCsrf(form);
        fetch(`/org/api/comp-roles/${compRoleOid}/delete`, { method: 'POST', body: form })
            .then(r => r.json())
            .then(data => {
                if (data.success) {
                    showToast('직책이 삭제되었습니다.', true);
                    doSearch(currentPage);
                } else {
                    showToast(data.message || '삭제 실패', false);
                }
            });
    }

    // ── 공통 유틸 ─────────────────────────────────────────────────
    function appendCsrf(formData) {
        const meta = document.querySelector('meta[name="_csrf"]');
        if (meta) formData.append('_csrf', meta.getAttribute('content'));
    }

    function showError(elId, msg) {
        const el = document.getElementById(elId);
        el.textContent = msg;
        el.style.display = 'block';
    }

    function showToast(msg, success) {
        const wrap  = document.getElementById('toast-wrap');
        const inner = document.getElementById('toast-inner');
        const icon  = document.getElementById('toast-icon');
        const text  = document.getElementById('toast-msg');
        inner.style.background = success ? '#16a34a' : '#dc2626';
        icon.className  = success ? 'fas fa-check-circle' : 'fas fa-times-circle';
        text.textContent = msg;
        wrap.style.display = 'block';
        setTimeout(() => { wrap.style.display = 'none'; }, 3000);
    }
</script>

<footer th:replace="~{include/footer :: footer}"></footer>
</body>
</html>
