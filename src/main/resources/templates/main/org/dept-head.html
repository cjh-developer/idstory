<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:replace="~{include/layout :: head('부서장 관리')}"></head>
<body>

<header th:replace="~{include/header :: header}"></header>

<div class="app-body">
    <aside th:replace="~{include/sidebar :: sidebar}"></aside>

    <main class="app-content">

        <!-- 페이지 헤더 -->
        <div class="page-header">
            <div>
                <div class="breadcrumb-area">
                    <i class="fas fa-house"></i>
                    <i class="fas fa-chevron-right"></i>
                    <span>조직 관리</span>
                    <i class="fas fa-chevron-right"></i>
                    <span>부서장 관리</span>
                </div>
                <h2 class="page-title">부서장 관리</h2>
                <p class="page-subtitle">부서별 부서장을 지정·변경·해제합니다.</p>
            </div>
        </div>

        <!-- 토스트 알림 -->
        <div id="toast-wrap" style="position:fixed;top:1.2rem;right:1.4rem;z-index:9999;min-width:280px;display:none;">
            <div id="toast-inner"
                 style="padding:.75rem 1.1rem;border-radius:8px;color:#fff;font-size:.88rem;font-weight:600;
                        display:flex;align-items:center;gap:.6rem;box-shadow:0 4px 12px rgba(0,0,0,.18);">
                <i id="toast-icon"></i><span id="toast-msg"></span>
            </div>
        </div>

        <!-- 2열 레이아웃 -->
        <div style="display:flex;gap:1.2rem;align-items:stretch;height:calc(100vh - 260px);">

            <!-- ── 왼쪽: 부서 트리 ──────────────────────────────────── -->
            <div class="card" style="width:280px;flex-shrink:0;display:flex;flex-direction:column;overflow:hidden;">
                <div class="card-body" style="padding:1rem;display:flex;flex-direction:column;flex:1;min-height:0;">
                    <div style="font-size:.85rem;font-weight:700;color:#374151;margin-bottom:.6rem;flex-shrink:0;">
                        <i class="fas fa-sitemap" style="margin-right:.4rem;color:#2563eb;"></i>부서 트리
                    </div>
                    <!-- 검색 -->
                    <div style="position:relative;margin-bottom:.7rem;flex-shrink:0;">
                        <i class="fas fa-search" style="position:absolute;left:.6rem;top:50%;transform:translateY(-50%);color:#9ca3af;font-size:.8rem;pointer-events:none;"></i>
                        <input type="text" id="treeSearch" placeholder="부서 검색"
                               oninput="filterDeptTree()"
                               style="width:100%;padding:.38rem .7rem .38rem 1.9rem;font-size:.83rem;
                                      border:1px solid #d1d5db;border-radius:6px;outline:none;box-sizing:border-box;">
                    </div>
                    <div id="deptTree" style="font-size:.88rem;line-height:1.7;overflow-y:auto;flex:1;min-height:0;padding-right:.2rem;">
                        <div style="color:#9ca3af;font-size:.83rem;padding:.5rem;">로딩 중...</div>
                    </div>
                </div>
            </div>

            <!-- ── 오른쪽: 부서장 패널 ──────────────────────────────── -->
            <div class="card" style="flex:1;display:flex;flex-direction:column;overflow:hidden;">
                <div class="card-body" id="headPanel" style="padding:1.5rem;color:#9ca3af;font-size:.88rem;overflow-y:auto;flex:1;min-height:0;">
                    <div style="text-align:center;padding:3rem 0;">
                        <i class="fas fa-hand-pointer" style="font-size:2rem;margin-bottom:.8rem;display:block;"></i>
                        왼쪽 트리에서 부서를 선택하면 부서장 정보가 표시됩니다.
                    </div>
                </div>
            </div>

        </div><!-- end 2열 -->

    </main>
</div>

<!-- ════════════════════════════════════════════════
     모달: 부서장 등록/변경
     ════════════════════════════════════════════════ -->
<div class="modal fade" id="modalAssignHead" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-lg modal-dialog-scrollable">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title"><i class="fas fa-user-tie" style="margin-right:.5rem;"></i>부서장 등록/변경</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body" style="padding:1.25rem;">

                <!-- 대상 부서 표시 -->
                <div style="background:#eff6ff;border:1px solid #bfdbfe;border-radius:8px;
                            padding:.7rem 1rem;margin-bottom:1rem;font-size:.85rem;">
                    <i class="fas fa-building" style="color:#2563eb;margin-right:.4rem;"></i>
                    부서: <strong id="headDeptName"></strong>
                </div>

                <!-- 검색 -->
                <div style="display:flex;gap:.5rem;margin-bottom:.8rem;">
                    <input type="text" id="headSearch" class="modal-input"
                           placeholder="아이디 또는 이름으로 검색" style="flex:1;"
                           oninput="searchHeadUsers()">
                    <button type="button" class="btn btn-sm btn-outline-secondary" onclick="searchHeadUsers()">
                        <i class="fas fa-search"></i>
                    </button>
                </div>

                <!-- 총 건수 -->
                <div style="font-size:.77rem;color:#6b7280;margin-bottom:.35rem;">
                    <span id="headTotalInfo"></span>
                </div>
                <div style="border:1px solid #e5e7eb;border-radius:8px;overflow:hidden;">
                    <table style="width:100%;border-collapse:collapse;font-size:.845rem;">
                        <thead>
                            <tr style="background:#f9fafb;">
                                <th style="padding:.55rem .8rem;font-weight:700;font-size:.75rem;color:#6b7280;text-align:left;border-bottom:1px solid #e5e7eb;">선택</th>
                                <th style="padding:.55rem .8rem;font-weight:700;font-size:.75rem;color:#6b7280;border-bottom:1px solid #e5e7eb;">아이디</th>
                                <th style="padding:.55rem .8rem;font-weight:700;font-size:.75rem;color:#6b7280;border-bottom:1px solid #e5e7eb;">이름</th>
                                <th style="padding:.55rem .8rem;font-weight:700;font-size:.75rem;color:#6b7280;border-bottom:1px solid #e5e7eb;">현재 부서</th>
                                <th style="padding:.55rem .8rem;font-weight:700;font-size:.75rem;color:#6b7280;border-bottom:1px solid #e5e7eb;">역할</th>
                            </tr>
                        </thead>
                        <tbody id="headUserList">
                            <tr><td colspan="5" style="text-align:center;padding:1.5rem;color:#9ca3af;">로딩 중...</td></tr>
                        </tbody>
                    </table>
                </div>
                <!-- 페이징 -->
                <div id="headPagination"></div>

            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary btn-sm" data-bs-dismiss="modal">닫기</button>
                <button type="button" class="btn btn-primary btn-sm" onclick="submitAssignHead()">
                    <i class="fas fa-user-tie"></i> 등록/변경
                </button>
            </div>
        </div>
    </div>
</div>

<!-- ════════════════════════════════════════════════
     JavaScript
     ════════════════════════════════════════════════ -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/js/common.js}"></script>
<script th:inline="javascript">
    // ── 상태 변수 ─────────────────────────────────────────────────────────────
    let allDepts        = [];
    let selectedDept    = null;
    let deptSearchKw    = '';
    let headUserOid     = '';   // 모달에서 선택된 사용자 OID
    let headCurrentPage = 0;
    let headCurrentKw   = '';
    const collapsedSet  = new Set(); // 접힌 노드 OID 집합

    // ── 초기화 ────────────────────────────────────────────────────────────────
    document.addEventListener('DOMContentLoaded', loadDeptTree);

    // ── 부서 트리 로드 ────────────────────────────────────────────────────────
    function loadDeptTree() {
        fetch('/org/api/depts?includeDeleted=false')
            .then(r => r.json())
            .then(data => {
                allDepts = data.filter(d => !d.deletedAt);
                renderDeptTree();
                // 루트(본부) 자동 선택
                const oidSet = new Set(allDepts.map(d => d.deptOid));
                const root = allDepts
                    .filter(d => d.useYn === 'Y')
                    .sort((a, b) => a.sortOrder - b.sortOrder)
                    .find(d => !d.parentDeptOid || !oidSet.has(d.parentDeptOid));
                if (root) selectDept(root.deptOid, root.deptName);
            })
            .catch(() => {
                document.getElementById('deptTree').innerHTML =
                    '<div style="color:#ef4444;font-size:.83rem;">로드 실패</div>';
            });
    }

    function filterDeptTree() {
        deptSearchKw = document.getElementById('treeSearch').value.trim().toLowerCase();
        renderDeptTree();
    }

    function renderDeptTree() {
        const treeEl = document.getElementById('deptTree');
        const depts  = allDepts.filter(d => d.useYn === 'Y');

        let filtered = depts;
        let matchedOids = new Set();
        if (deptSearchKw) {
            depts.forEach(d => {
                if (d.deptName.toLowerCase().includes(deptSearchKw) ||
                    d.deptCode.toLowerCase().includes(deptSearchKw)) {
                    matchedOids.add(d.deptOid);
                }
            });
            const oidToParent = {};
            depts.forEach(d => { oidToParent[d.deptOid] = d.parentDeptOid; });
            const visible = new Set(matchedOids);
            matchedOids.forEach(oid => {
                let cur = oidToParent[oid];
                while (cur) { visible.add(cur); cur = oidToParent[cur]; }
            });
            filtered = depts.filter(d => visible.has(d.deptOid));
        }

        if (filtered.length === 0) {
            treeEl.innerHTML = '<div style="color:#9ca3af;font-size:.83rem;padding:.5rem;">검색 결과 없음</div>';
            return;
        }

        const oidSet = new Set(filtered.map(d => d.deptOid));
        const roots  = filtered.filter(d => !d.parentDeptOid || !oidSet.has(d.parentDeptOid));
        treeEl.innerHTML = buildDeptTree(roots, filtered, 0, matchedOids);
    }

    function buildDeptTree(nodes, all, depth, matchedOids) {
        let html = '';
        nodes.sort((a, b) => a.sortOrder - b.sortOrder);
        for (const node of nodes) {
            const children    = all.filter(d => d.parentDeptOid === node.deptOid);
            const hasChildren = children.length > 0;
            const indent      = depth * 14;
            const isSelected  = selectedDept && selectedDept.deptOid === node.deptOid;
            const isMatched   = matchedOids.size > 0 && matchedOids.has(node.deptOid);
            // 검색 중에는 접힌 상태 무시
            const isCollapsed = !deptSearchKw && collapsedSet.has(node.deptOid);

            let style = `cursor:pointer;padding:.28rem .5rem;border-radius:6px;display:flex;align-items:center;gap:.4rem;`;
            if (isSelected) style += 'background:#eff6ff;font-weight:700;color:#2563eb;';
            if (isMatched && !isSelected) style += 'border-left:3px solid #2563eb;padding-left:.35rem;';

            const nameHtml = deptSearchKw
                ? node.deptName.replace(new RegExp(deptSearchKw.replace(/[.*+?^${}()|[\]\\]/g,'\\$&'), 'gi'),
                    m => `<mark style="background:#fef08a;padding:0;border-radius:2px;">${m}</mark>`)
                : node.deptName;

            const toggleBtn = hasChildren
                ? `<i class="fas fa-chevron-${isCollapsed ? 'right' : 'down'}"
                      onclick="event.stopPropagation();toggleNode('${node.deptOid}')"
                      style="font-size:.62rem;color:#6b7280;width:10px;flex-shrink:0;cursor:pointer;"></i>`
                : `<span style="display:inline-block;width:10px;flex-shrink:0;"></span>`;

            const icon = hasChildren ? (isCollapsed ? 'fa-folder' : 'fa-folder-open') : 'fa-building';

            html += `<div style="margin-left:${indent}px;">
                <div style="${style}" onclick="selectDept('${node.deptOid}','${node.deptName.replace(/'/g,"\\'")}')">
                    ${toggleBtn}
                    <i class="fas ${icon}" style="color:${isSelected?'#2563eb':'#6b7280'};font-size:.8rem;width:14px;flex-shrink:0;"></i>
                    <span>${nameHtml}</span>
                    <span style="font-size:.74rem;color:#9ca3af;">(${node.deptCode})</span>
                </div>`;
            if (hasChildren) {
                html += `<div id="children_${node.deptOid}" style="${isCollapsed ? 'display:none;' : ''}">`;
                html += buildDeptTree(children, all, depth + 1, matchedOids);
                html += `</div>`;
            }
            html += `</div>`;
        }
        return html;
    }

    function toggleNode(deptOid) {
        if (collapsedSet.has(deptOid)) {
            collapsedSet.delete(deptOid);
        } else {
            collapsedSet.add(deptOid);
        }
        renderDeptTree();
    }

    // ── 부서 선택 → 부서장 패널 로드 ─────────────────────────────────────────
    function selectDept(deptOid, deptName) {
        selectedDept = { deptOid, deptName };
        renderDeptTree();
        loadHeadPanel();
    }

    function loadHeadPanel() {
        if (!selectedDept) return;
        fetch(`/org/api/dept-head?deptOid=${encodeURIComponent(selectedDept.deptOid)}`)
            .then(r => r.json())
            .then(renderHeadPanel);
    }

    // ── 부서장 패널 렌더링 ────────────────────────────────────────────────────
    function renderHeadPanel(data) {
        const panel = document.getElementById('headPanel');
        const deptName = selectedDept ? selectedDept.deptName : '';

        // 부서장 있음
        if (data.headOid) {
            panel.innerHTML = `
                <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:1.2rem;">
                    <div>
                        <span style="font-size:1rem;font-weight:700;">${deptName}</span>
                        <span style="font-size:.82rem;color:#9ca3af;margin-left:.5rem;">부서장 정보</span>
                    </div>
                    <div style="display:flex;gap:.5rem;">
                        <button type="button" class="btn btn-sm btn-outline-primary" onclick="openAssignHeadModal()">
                            <i class="fas fa-user-pen"></i> 변경
                        </button>
                        <button type="button" class="btn btn-sm btn-outline-danger"
                                onclick="removeHead('${data.headOid}','${data.userName}')">
                            <i class="fas fa-user-minus"></i> 해제
                        </button>
                    </div>
                </div>
                <div style="background:#f8fafc;border:1px solid #e2e8f0;border-radius:12px;padding:1.5rem;">
                    <div style="display:flex;align-items:center;gap:1rem;margin-bottom:1.2rem;">
                        <div style="width:56px;height:56px;border-radius:50%;background:#2563eb;display:flex;align-items:center;justify-content:center;">
                            <i class="fas fa-user-tie" style="color:#fff;font-size:1.4rem;"></i>
                        </div>
                        <div>
                            <div style="font-size:1.1rem;font-weight:700;color:#1e293b;">${data.userName || '—'}</div>
                            <div style="font-size:.85rem;color:#64748b;">@${data.userId || '—'}</div>
                        </div>
                    </div>
                    <div style="display:grid;grid-template-columns:1fr 1fr;gap:.8rem;font-size:.875rem;">
                        <div style="background:#fff;border:1px solid #e2e8f0;border-radius:8px;padding:.8rem 1rem;">
                            <div style="color:#9ca3af;font-size:.75rem;margin-bottom:.2rem;">이메일</div>
                            <div style="font-weight:600;color:#374151;font-size:.82rem;">${data.email || '—'}</div>
                        </div>
                        <div style="background:#fff;border:1px solid #e2e8f0;border-radius:8px;padding:.8rem 1rem;">
                            <div style="color:#9ca3af;font-size:.75rem;margin-bottom:.2rem;">휴대번호</div>
                            <div style="font-weight:600;color:#374151;font-size:.82rem;">${data.phone || '—'}</div>
                        </div>
                        <div style="background:#fff;border:1px solid #e2e8f0;border-radius:8px;padding:.8rem 1rem;">
                            <div style="color:#9ca3af;font-size:.75rem;margin-bottom:.2rem;">담당 업무</div>
                            <div style="font-weight:600;color:#374151;font-size:.82rem;">${data.jobDuty || '—'}</div>
                        </div>
                        <div style="background:#fff;border:1px solid #e2e8f0;border-radius:8px;padding:.8rem 1rem;">
                            <div style="color:#9ca3af;font-size:.75rem;margin-bottom:.2rem;">계정 상태</div>
                            <div style="font-weight:600;color:#374151;font-size:.82rem;">${data.status || '—'}${data.lockYn === 'Y' ? ' <span style="font-size:.7rem;background:#ffedd5;color:#c2410c;padding:1px 5px;border-radius:4px;">잠금</span>' : ''}</div>
                        </div>
                        <div style="background:#fff;border:1px solid #e2e8f0;border-radius:8px;padding:.8rem 1rem;">
                            <div style="color:#9ca3af;font-size:.75rem;margin-bottom:.2rem;">사용여부</div>
                            <div style="font-weight:600;color:#374151;font-size:.82rem;">${data.useYn === 'Y' ? '사용' : '미사용'}</div>
                        </div>
                        <div style="background:#fff;border:1px solid #e2e8f0;border-radius:8px;padding:.8rem 1rem;">
                            <div style="color:#9ca3af;font-size:.75rem;margin-bottom:.2rem;">사용자 OID</div>
                            <div style="font-weight:600;color:#374151;font-size:.82rem;">${data.userOid || '—'}</div>
                        </div>
                        <div style="background:#fff;border:1px solid #e2e8f0;border-radius:8px;padding:.8rem 1rem;">
                            <div style="color:#9ca3af;font-size:.75rem;margin-bottom:.2rem;">등록일시</div>
                            <div style="font-weight:600;color:#374151;font-size:.82rem;">${data.createdAt ? data.createdAt.replace('T',' ').substring(0,19) : '—'}</div>
                        </div>
                        <div style="background:#fff;border:1px solid #e2e8f0;border-radius:8px;padding:.8rem 1rem;">
                            <div style="color:#9ca3af;font-size:.75rem;margin-bottom:.2rem;">등록자</div>
                            <div style="font-weight:600;color:#374151;font-size:.82rem;">${data.createdBy || '—'}</div>
                        </div>
                        <div style="background:#fff;border:1px solid #e2e8f0;border-radius:8px;padding:.8rem 1rem;">
                            <div style="color:#9ca3af;font-size:.75rem;margin-bottom:.2rem;">수정일시</div>
                            <div style="font-weight:600;color:#374151;font-size:.82rem;">${data.updatedAt ? data.updatedAt.replace('T',' ').substring(0,19) : '—'}</div>
                        </div>
                        <div style="background:#fff;border:1px solid #e2e8f0;border-radius:8px;padding:.8rem 1rem;">
                            <div style="color:#9ca3af;font-size:.75rem;margin-bottom:.2rem;">수정자</div>
                            <div style="font-weight:600;color:#374151;font-size:.82rem;">${data.updatedBy || '—'}</div>
                        </div>
                    </div>
                </div>`;
        } else {
            // 부서장 미지정
            panel.innerHTML = `
                <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:1.2rem;">
                    <div>
                        <span style="font-size:1rem;font-weight:700;">${deptName}</span>
                        <span style="font-size:.82rem;color:#9ca3af;margin-left:.5rem;">부서장 정보</span>
                    </div>
                    <button type="button" class="btn btn-sm btn-primary" onclick="openAssignHeadModal()">
                        <i class="fas fa-user-plus"></i> 부서장 등록
                    </button>
                </div>
                <div style="text-align:center;padding:3rem 0;background:#f8fafc;border:2px dashed #e2e8f0;border-radius:12px;">
                    <i class="fas fa-user-slash" style="font-size:2.5rem;color:#d1d5db;margin-bottom:.8rem;display:block;"></i>
                    <div style="font-size:.92rem;font-weight:600;color:#94a3b8;margin-bottom:.4rem;">부서장 미지정</div>
                    <div style="font-size:.82rem;color:#cbd5e1;">이 부서에는 아직 부서장이 지정되지 않았습니다.</div>
                </div>`;
        }
    }

    // ── 부서장 해제 ──────────────────────────────────────────────────────────
    function removeHead(headOid, userName) {
        if (!confirm(`"${userName}"의 부서장을 해제하시겠습니까?`)) return;
        const form = new FormData();
        appendCsrf(form);
        fetch(`/org/api/dept-head/${headOid}/delete`, { method:'POST', body:form })
            .then(r => r.json())
            .then(data => {
                if (data.success) {
                    showToast('부서장이 해제되었습니다.', true);
                    loadHeadPanel();
                } else {
                    showToast(data.message || '해제 실패', false);
                }
            });
    }

    // ── 부서장 등록/변경 모달 ────────────────────────────────────────────────
    function openAssignHeadModal() {
        if (!selectedDept) return;
        document.getElementById('headDeptName').textContent = selectedDept.deptName;
        document.getElementById('headSearch').value = '';
        headUserOid     = '';
        headCurrentPage = 0;
        headCurrentKw   = '';
        new bootstrap.Modal(document.getElementById('modalAssignHead')).show();
        fetchHeadUsers('', 0);
    }

    let headSearchTimer = null;
    function searchHeadUsers() {
        clearTimeout(headSearchTimer);
        headSearchTimer = setTimeout(() => {
            headCurrentKw   = document.getElementById('headSearch').value.trim();
            headCurrentPage = 0;
            fetchHeadUsers(headCurrentKw, 0);
        }, 250);
    }

    function goHeadPage(page) {
        fetchHeadUsers(headCurrentKw, page);
    }

    function fetchHeadUsers(kw, page) {
        headCurrentPage = page;
        document.getElementById('headUserList').innerHTML =
            '<tr><td colspan="5" style="text-align:center;padding:1.5rem;color:#9ca3af;">로딩 중...</td></tr>';
        document.getElementById('headPagination').innerHTML = '';
        fetch(`/org/api/assignable-users?keyword=${encodeURIComponent(kw)}&page=${page}`)
            .then(r => r.json())
            .then(data => {
                const users         = data.users         || [];
                const totalPages    = data.totalPages    || 0;
                const totalElements = data.totalElements || 0;
                const tbody = document.getElementById('headUserList');
                if (users.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="5" style="text-align:center;padding:1.5rem;color:#9ca3af;">검색 결과 없음</td></tr>';
                    document.getElementById('headTotalInfo').textContent = '';
                    return;
                }
                document.getElementById('headTotalInfo').textContent = `총 ${totalElements}명`;
                tbody.innerHTML = users.map(u => `
                    <tr id="head-row-${u.oid}" style="cursor:pointer;border-bottom:1px solid #f3f4f6;"
                        onclick="selectHeadUser('${u.oid}')">
                        <td style="padding:.5rem .8rem;text-align:center;">
                            <input type="radio" name="headUser" value="${u.oid}"
                                   ${u.oid === headUserOid ? 'checked' : ''}>
                        </td>
                        <td style="padding:.5rem .8rem;font-size:.84rem;">${u.userId}</td>
                        <td style="padding:.5rem .8rem;font-size:.84rem;font-weight:600;">${u.name}</td>
                        <td style="padding:.5rem .8rem;font-size:.82rem;color:#9ca3af;">${u.deptCode || '(없음)'}</td>
                        <td style="padding:.5rem .8rem;">
                            <span class="badge ${u.role==='ADMIN'?'bg-primary':'bg-success'}">${u.role==='ADMIN'?'관리자':'일반'}</span>
                        </td>
                    </tr>`).join('');
                document.getElementById('headPagination').innerHTML =
                    buildPagination(page, totalPages, 'goHeadPage');
            });
    }

    function selectHeadUser(oid) {
        headUserOid = oid;
        document.querySelectorAll('[name="headUser"]').forEach(r => { r.checked = r.value === oid; });
    }

    function submitAssignHead() {
        if (!headUserOid)  { showToast('등록할 사용자를 선택하세요.', false); return; }
        if (!selectedDept) { showToast('부서를 먼저 선택하세요.', false); return; }

        const form = new FormData();
        form.append('deptOid', selectedDept.deptOid);
        form.append('userOid', headUserOid);
        appendCsrf(form);
        fetch('/org/api/dept-head', { method:'POST', body:form })
            .then(r => r.json())
            .then(data => {
                if (data.success) {
                    bootstrap.Modal.getInstance(document.getElementById('modalAssignHead'))?.hide();
                    showToast('부서장이 등록/변경되었습니다.', true);
                    loadHeadPanel();
                } else {
                    showToast(data.message || '등록 실패', false);
                }
            });
    }

    // ── 페이징 HTML 생성 ──────────────────────────────────────────────────────
    function buildPagination(currentPage, totalPages, onClickFn) {
        if (totalPages <= 1) return '';
        const btnBase = 'style="padding:.25rem .55rem;font-size:.78rem;min-width:28px;border:1px solid #d1d5db;border-radius:5px;cursor:pointer;background:#fff;color:#374151;"';
        const btnAct  = 'style="padding:.25rem .55rem;font-size:.78rem;min-width:28px;border:1px solid #2563eb;border-radius:5px;background:#2563eb;color:#fff;font-weight:700;"';
        const btnDis  = 'style="padding:.25rem .55rem;font-size:.78rem;min-width:28px;border:1px solid #e5e7eb;border-radius:5px;background:#f9fafb;color:#d1d5db;cursor:default;"';
        let html = '<div style="display:flex;justify-content:center;align-items:center;gap:.3rem;margin-top:.9rem;">';
        html += currentPage > 0
            ? `<button ${btnBase} onclick="${onClickFn}(${currentPage-1})"><i class="fas fa-chevron-left"></i></button>`
            : `<button ${btnDis} disabled><i class="fas fa-chevron-left"></i></button>`;
        const start = Math.max(0, currentPage - 2);
        const end   = Math.min(totalPages - 1, currentPage + 2);
        if (start > 0) html += `<button ${btnBase} onclick="${onClickFn}(0)">1</button>${start > 1 ? '<span style="color:#9ca3af;padding:0 .2rem;">…</span>' : ''}`;
        for (let i = start; i <= end; i++) {
            html += i === currentPage
                ? `<button ${btnAct}>${i+1}</button>`
                : `<button ${btnBase} onclick="${onClickFn}(${i})">${i+1}</button>`;
        }
        if (end < totalPages - 1) html += `${end < totalPages - 2 ? '<span style="color:#9ca3af;padding:0 .2rem;">…</span>' : ''}<button ${btnBase} onclick="${onClickFn}(${totalPages-1})">${totalPages}</button>`;
        html += currentPage < totalPages - 1
            ? `<button ${btnBase} onclick="${onClickFn}(${currentPage+1})"><i class="fas fa-chevron-right"></i></button>`
            : `<button ${btnDis} disabled><i class="fas fa-chevron-right"></i></button>`;
        html += '</div>';
        return html;
    }

    // ── 공통 유틸 ─────────────────────────────────────────────────────────────
    function appendCsrf(formData) {
        const meta = document.querySelector('meta[name="_csrf"]');
        if (meta) formData.append('_csrf', meta.getAttribute('content'));
    }

    function showToast(msg, success) {
        const wrap  = document.getElementById('toast-wrap');
        const inner = document.getElementById('toast-inner');
        const icon  = document.getElementById('toast-icon');
        const text  = document.getElementById('toast-msg');
        inner.style.background = success ? '#16a34a' : '#dc2626';
        icon.className  = success ? 'fas fa-check-circle' : 'fas fa-times-circle';
        text.textContent = msg;
        wrap.style.display = 'block';
        setTimeout(() => { wrap.style.display = 'none'; }, 3000);
    }
</script>

<footer th:replace="~{include/footer :: footer}"></footer>
</body>
</html>
