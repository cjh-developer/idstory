<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>접근 차단 - IDStory IAM</title>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"/>
    <style>
        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #f1f5f9;
            font-family: 'Pretendard', 'Noto Sans KR', sans-serif;
        }
        .denied-card {
            background: #fff;
            border-radius: 16px;
            box-shadow: 0 4px 32px rgba(0,0,0,.1);
            padding: 3rem 2.5rem;
            text-align: center;
            max-width: 480px;
            width: 100%;
        }
        .denied-icon {
            width: 80px; height: 80px;
            background: #fef2f2;
            border-radius: 50%;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            color: #dc2626;
            margin-bottom: 1.5rem;
        }
        .denied-title {
            font-size: 1.5rem;
            font-weight: 700;
            color: #1e293b;
            margin-bottom: .5rem;
        }
        .denied-subtitle {
            font-size: .95rem;
            color: #64748b;
            margin-bottom: 2rem;
            line-height: 1.6;
        }
        .denied-info {
            background: #f8fafc;
            border: 1px solid #e2e8f0;
            border-radius: 10px;
            padding: 1rem 1.5rem;
            margin-bottom: 2rem;
            text-align: left;
        }
        .denied-info-row {
            display: flex;
            align-items: center;
            gap: .6rem;
            font-size: .88rem;
            color: #475569;
            padding: .3rem 0;
        }
        .denied-info-row i { color: #94a3b8; width: 16px; }
        .denied-info-val {
            font-family: monospace;
            font-weight: 600;
            color: #dc2626;
        }
        .btn-back {
            display: inline-flex;
            align-items: center;
            gap: .5rem;
            padding: .75rem 2rem;
            background: #2563eb;
            color: #fff;
            border: none;
            border-radius: 8px;
            font-size: .95rem;
            font-weight: 600;
            cursor: pointer;
            text-decoration: none;
        }
        .btn-back:hover { background: #1d4ed8; color: #fff; text-decoration: none; }
    </style>
</head>
<body>
    <div class="denied-card">
        <div class="denied-icon">
            <i class="fas fa-ban"></i>
        </div>
        <div class="denied-title">접근이 차단되었습니다</div>
        <p class="denied-subtitle">
            시스템 접근 제어 정책에 의해 현재 디바이스의 접근이 허용되지 않습니다.<br/>
            관리자에게 문의하여 접근 권한을 요청하세요.
        </p>

        <div class="denied-info">
            <div class="denied-info-row">
                <i class="fas fa-shield-halved"></i>
                <span>차단 유형:</span>
                <span class="denied-info-val"
                      th:text="${blockType == 'IP'} ? 'IP 접근 제어' : 'MAC 접근 제어'">IP 접근 제어</span>
            </div>
            <div class="denied-info-row">
                <i th:class="${blockType == 'IP'} ? 'fas fa-network-wired' : 'fas fa-computer'"></i>
                <span th:text="${blockType == 'IP'} ? '접속 IP:' : '디바이스 MAC:'">접속 IP:</span>
                <span class="denied-info-val" th:text="${blockVal}">-</span>
            </div>
        </div>

        <a href="/login" class="btn-back">
            <i class="fas fa-arrow-left"></i> 로그인 페이지로
        </a>
    </div>
</body>
</html>
