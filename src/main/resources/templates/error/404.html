<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>404 - 페이지를 찾을 수 없습니다 | IDStory</title>

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"/>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css"/>
    <link rel="stylesheet" th:href="@{/css/common.css}"/>

    <style>
        body {
            min-height: 100vh; background: #f4f6fb;
            display: flex; align-items: center; justify-content: center;
            padding: 2rem 1rem;
        }
        .error-card {
            background: #fff; border-radius: 20px;
            border: 1px solid var(--blue-100);
            box-shadow: 0 8px 32px rgba(37,99,235,.10);
            padding: 3rem 2.5rem; text-align: center;
            max-width: 440px; width: 100%;
        }
        .error-code {
            font-size: 5rem; font-weight: 800;
            background: linear-gradient(135deg, var(--blue-500), var(--blue-900));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            line-height: 1; margin-bottom: .5rem;
        }
        .error-title { font-size: 1.2rem; font-weight: 700; color: var(--gray-800); margin-bottom: .5rem; }
        .error-desc  { font-size: .875rem; color: var(--gray-500); margin-bottom: 2rem; }
        .btn-home {
            display: inline-flex; align-items: center; gap: .4rem;
            padding: .6rem 1.5rem; border-radius: 10px;
            background: var(--blue-600); color: #fff;
            font-size: .9rem; font-weight: 600; text-decoration: none;
            transition: background .2s, transform .2s;
        }
        .btn-home:hover { background: var(--blue-700); color: #fff; transform: translateY(-1px); text-decoration: none; }
    </style>
</head>
<body>
<div class="error-card">
    <div class="error-code">404</div>
    <h1 class="error-title">페이지를 찾을 수 없습니다</h1>
    <p class="error-desc">
        요청하신 페이지가 존재하지 않거나 이동되었습니다.<br/>
        URL을 확인하거나 홈으로 돌아가세요.
    </p>
    <div style="display:flex; gap:.7rem; justify-content:center;">
        <a class="btn-home" th:href="@{/main/dashboard}">
            <i class="fas fa-house"></i> 홈으로
        </a>
        <a style="display:inline-flex; align-items:center; gap:.4rem; padding:.6rem 1.5rem; border-radius:10px; border:1.5px solid var(--gray-200); color:var(--gray-600); font-size:.9rem; font-weight:600; text-decoration:none; transition:all .2s;"
           href="javascript:history.back()">
            <i class="fas fa-arrow-left"></i> 뒤로가기
        </a>
    </div>
</div>
</body>
</html>
