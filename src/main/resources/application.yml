server:
  port: 9091
  servlet:
    encoding:
      charset: UTF-8
      enabled: true
      force: true
    session:
      timeout: 30m

spring:
  application:
    name: idstory-auth

  # ── 데이터소스 설정 ──────────────────────────────────────────────────────────
  datasource:
    url: jdbc:mysql://localhost:3306/idstory?useSSL=false&serverTimezone=Asia/Seoul&characterEncoding=UTF-8&allowPublicKeyRetrieval=true
    username: idstory
    password: idstory01
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
      pool-name: IdstoryHikariPool

  # ── JPA / Hibernate 설정 ─────────────────────────────────────────────────────
  jpa:
    hibernate:
      ddl-auto: none          # 스키마 자동 생성 비활성화 (scripts/schema.sql 사용)
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true
        default_batch_fetch_size: 100
    open-in-view: false

  # ── Thymeleaf 설정 ────────────────────────────────────────────────────────────
  thymeleaf:
    encoding: UTF-8
    cache: false              # 개발 중 캐시 비활성화 (운영 시 true 권장)
    prefix: classpath:/templates/
    suffix: .html

  # ── 다국어 메세지 설정 ────────────────────────────────────────────────────────
  # 메세지 파일 위치: src/main/resources/messages/messages*.properties
  messages:
    basename: messages/messages
    encoding: UTF-8
    cache-duration: 3600      # 1시간 캐시 (개발 시 -1 또는 0으로 설정)
    fallback-to-system-locale: false

# ── SSO / OIDC 설정 ───────────────────────────────────────────────────────────
sso:
  issuer: http://localhost:9091   # 운영 시 실제 도메인으로 변경

# ── 로깅 설정 ─────────────────────────────────────────────────────────────────
logging:
  level:
    root: INFO
    org.springframework.security: DEBUG
    com.idstory: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
    file:    "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
  file:
    name: logs/idstory.log
  logback:
    rollingpolicy:
      file-name-pattern: logs/idstory.%d{yyyy-MM-dd}.%i.log
      max-file-size: 10MB
      max-history: 30
      total-size-cap: 1GB
