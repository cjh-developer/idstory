<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:replace="~{include/layout :: head('대시보드')}"></head>
<body>

<header th:replace="~{include/header :: header}"></header>

<div class="app-body">
    <aside th:replace="~{include/sidebar :: sidebar}"></aside>

    <main class="app-content">

        <!-- 페이지 헤더 -->
        <div class="page-header">
            <div>
                <div class="breadcrumb-area">
                    <i class="fas fa-house"></i>
                    <i class="fas fa-chevron-right"></i>
                    <span>대시보드</span>
                </div>
                <h2 class="page-title">대시보드</h2>
                <p class="page-subtitle">IDStory 시스템 현황을 확인하세요.</p>
            </div>
        </div>

        <!-- Stat 카드 -->
        <div class="stat-grid">
            <div class="stat-card">
                <div class="stat-icon-wrap stat-icon-blue">
                    <i class="fas fa-users"></i>
                </div>
                <div class="stat-info">
                    <div class="stat-label">전체 사용자</div>
                    <div class="stat-value" th:text="${statTotal}">0</div>
                </div>
            </div>
            <div class="stat-card">
                <div class="stat-icon-wrap stat-icon-green">
                    <i class="fas fa-user-check"></i>
                </div>
                <div class="stat-info">
                    <div class="stat-label">활성 계정</div>
                    <div class="stat-value" th:text="${statActive}">0</div>
                </div>
            </div>
            <div class="stat-card">
                <div class="stat-icon-wrap stat-icon-amber">
                    <i class="fas fa-user-shield"></i>
                </div>
                <div class="stat-info">
                    <div class="stat-label">관리자</div>
                    <div class="stat-value" th:text="${statAdmin}">0</div>
                </div>
            </div>
            <div class="stat-card">
                <div class="stat-icon-wrap stat-icon-red">
                    <i class="fas fa-user-slash"></i>
                </div>
                <div class="stat-info">
                    <div class="stat-label">비활성 계정</div>
                    <div class="stat-value" th:text="${statInactive}">0</div>
                </div>
            </div>
        </div>

        <!-- 환영 카드 -->
        <div class="card">
            <div class="card-header">
                <span class="card-title">
                    <i class="fas fa-circle-info"></i> 시스템 정보
                </span>
            </div>
            <div class="card-body">
                <div style="display:flex; align-items:center; gap:.6rem; margin-bottom:.9rem;">
                    <span style="font-size:.9rem; color:var(--gray-600);">
                        <i class="fas fa-circle-check" style="color:var(--green-600); margin-right:.35rem;"></i>
                        로그인 성공 — 반갑습니다,
                        <strong sec:authentication="name" style="color:var(--blue-600);">사용자</strong>님!
                    </span>
                </div>
                <p style="font-size:.855rem; color:var(--gray-500); line-height:1.65; margin:0;" th:text="#{home.description}">
                    IDStory 시스템에 성공적으로 로그인하셨습니다.
                </p>
            </div>
        </div>

    </main>
</div>

<footer th:replace="~{include/footer :: footer}"></footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/js/common.js}"></script>
</body>
</html>
