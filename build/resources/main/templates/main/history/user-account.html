<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:replace="~{include/layout :: head('사용자 계정 이력')}"></head>
<body>

<header th:replace="~{include/header :: header}"></header>

<div class="app-body">
    <aside th:replace="~{include/sidebar :: sidebar}"></aside>

    <main class="app-content">

        <!-- 페이지 헤더 -->
        <div class="page-header">
            <div>
                <div class="breadcrumb-area">
                    <i class="fas fa-house"></i>
                    <i class="fas fa-chevron-right"></i>
                    <span>감사 / 이력 관리</span>
                    <i class="fas fa-chevron-right"></i>
                    <span>사용자 계정 이력</span>
                </div>
                <h2 class="page-title">사용자 계정 이력</h2>
                <p class="page-subtitle">사용자 계정 생성·변경·잠금 등의 이력을 조회합니다.</p>
            </div>
        </div>

        <!-- 검색 필터 -->
        <div class="card" style="margin-bottom:1rem;">
            <div class="card-body">
                <form th:action="@{/history/user-account}" method="get"
                      style="display:flex;flex-wrap:wrap;gap:.8rem;align-items:flex-end;">

                    <div>
                        <label style="display:block;font-size:.82rem;font-weight:600;margin-bottom:.3rem;">처리 유형</label>
                        <select name="actionType" class="modal-input" style="width:140px;">
                            <option value="">전체</option>
                            <option value="CREATE"    th:selected="${actionType == 'CREATE'}">CREATE</option>
                            <option value="UPDATE"    th:selected="${actionType == 'UPDATE'}">UPDATE</option>
                            <option value="DELETE"    th:selected="${actionType == 'DELETE'}">DELETE</option>
                            <option value="LOCK"      th:selected="${actionType == 'LOCK'}">LOCK</option>
                            <option value="UNLOCK"    th:selected="${actionType == 'UNLOCK'}">UNLOCK</option>
                            <option value="RESET_PWD" th:selected="${actionType == 'RESET_PWD'}">RESET_PWD</option>
                        </select>
                    </div>

                    <div>
                        <label style="display:block;font-size:.82rem;font-weight:600;margin-bottom:.3rem;">대상 사용자</label>
                        <input type="text" name="username" class="modal-input"
                               th:value="${username}"
                               placeholder="계정 검색" style="width:160px;"/>
                    </div>

                    <div>
                        <label style="display:block;font-size:.82rem;font-weight:600;margin-bottom:.3rem;">시작 날짜</label>
                        <input type="date" name="dateFrom" class="modal-input"
                               th:value="${dateFrom}" style="width:150px;"/>
                    </div>

                    <div>
                        <label style="display:block;font-size:.82rem;font-weight:600;margin-bottom:.3rem;">종료 날짜</label>
                        <input type="date" name="dateTo" class="modal-input"
                               th:value="${dateTo}" style="width:150px;"/>
                    </div>

                    <div style="display:flex;gap:.5rem;">
                        <button type="submit" class="btn-modal-save" style="padding:.45rem 1rem;">
                            <i class="fas fa-magnifying-glass"></i> 검색
                        </button>
                        <a th:href="@{/history/user-account}" class="btn-modal-cancel" style="padding:.45rem 1rem;text-decoration:none;">
                            초기화
                        </a>
                    </div>
                </form>
            </div>
        </div>

        <!-- 이력 목록 -->
        <div class="card">
            <div class="card-header">
                <span class="card-title">
                    <i class="fas fa-clock-rotate-left"></i> 이력 목록
                </span>
                <span style="font-size:.78rem; color:var(--gray-400);">
                    총 <strong th:text="${historyPage.totalElements}">0</strong>건
                </span>
            </div>
            <div class="card-body" style="padding:0;">
                <div class="menu-table-wrap">
                    <table class="menu-table">
                        <thead>
                        <tr>
                            <th style="width:160px;">대상 사용자</th>
                            <th style="width:120px;">처리 유형</th>
                            <th>변경 내용</th>
                            <th style="width:120px;">처리자</th>
                            <th style="width:170px;">처리 일시</th>
                            <th style="width:130px;">IP 주소</th>
                        </tr>
                        </thead>
                        <tbody>
                        <tr th:each="h : ${historyPage.content}">
                            <td>
                                <span th:text="${h.targetUsername} ?: '-'">username</span>
                                <br/>
                                <span style="font-size:.75rem;color:var(--gray-400);"
                                      th:text="${h.targetUserOid}">oid</span>
                            </td>
                            <td class="cell-center">
                                <span th:switch="${h.actionType}">
                                    <span th:case="'CREATE'"    class="role-badge"
                                          style="background:var(--blue-100);color:var(--blue-700);">CREATE</span>
                                    <span th:case="'UPDATE'"    class="role-badge"
                                          style="background:#fef9c3;color:#a16207;">UPDATE</span>
                                    <span th:case="'DELETE'"    class="role-badge"
                                          style="background:#fee2e2;color:#b91c1c;">DELETE</span>
                                    <span th:case="'LOCK'"      class="role-badge"
                                          style="background:#ffedd5;color:#c2410c;">LOCK</span>
                                    <span th:case="'UNLOCK'"    class="role-badge"
                                          style="background:#dcfce7;color:#15803d;">UNLOCK</span>
                                    <span th:case="'RESET_PWD'" class="role-badge"
                                          style="background:#f3e8ff;color:#7e22ce;">RESET_PWD</span>
                                    <span th:case="*"           class="role-badge"
                                          th:text="${h.actionType}">TYPE</span>
                                </span>
                            </td>
                            <td>
                                <span th:text="${h.actionDetail} ?: '—'"
                                      style="font-size:.85rem;">상세</span>
                            </td>
                            <td th:text="${h.performedBy} ?: '—'">처리자</td>
                            <td th:text="${#temporals.format(h.performedAt, 'yyyy-MM-dd HH:mm:ss')}">일시</td>
                            <td th:text="${h.ipAddress} ?: '—'">IP</td>
                        </tr>

                        <tr th:if="${historyPage.content.isEmpty()}">
                            <td colspan="6" class="cell-empty">이력 데이터가 없습니다.</td>
                        </tr>
                        </tbody>
                    </table>
                </div>
            </div>

            <!-- 페이지네이션 -->
            <div th:if="${historyPage.totalPages > 1}"
                 style="display:flex;justify-content:center;gap:.4rem;padding:1rem;">
                <a th:if="${!historyPage.first}"
                   th:href="@{/history/user-account(page=${historyPage.number - 1},actionType=${actionType},username=${username},dateFrom=${dateFrom},dateTo=${dateTo})}"
                   style="padding:.3rem .7rem;border:1px solid var(--gray-200);border-radius:6px;text-decoration:none;color:var(--gray-600);">
                    <i class="fas fa-chevron-left"></i>
                </a>
                <th:block th:each="i : ${#numbers.sequence(0, historyPage.totalPages - 1)}">
                    <a th:href="@{/history/user-account(page=${i},actionType=${actionType},username=${username},dateFrom=${dateFrom},dateTo=${dateTo})}"
                       th:text="${i + 1}"
                       th:style="${i == historyPage.number} ?
                           'padding:.3rem .7rem;border:1px solid var(--blue-500);border-radius:6px;text-decoration:none;background:var(--blue-500);color:#fff;' :
                           'padding:.3rem .7rem;border:1px solid var(--gray-200);border-radius:6px;text-decoration:none;color:var(--gray-600);'">
                        1
                    </a>
                </th:block>
                <a th:if="${!historyPage.last}"
                   th:href="@{/history/user-account(page=${historyPage.number + 1},actionType=${actionType},username=${username},dateFrom=${dateFrom},dateTo=${dateTo})}"
                   style="padding:.3rem .7rem;border:1px solid var(--gray-200);border-radius:6px;text-decoration:none;color:var(--gray-600);">
                    <i class="fas fa-chevron-right"></i>
                </a>
            </div>
        </div>

    </main>
</div>

<footer th:replace="~{include/footer :: footer}"></footer>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/js/common.js}"></script>

</body>
</html>
