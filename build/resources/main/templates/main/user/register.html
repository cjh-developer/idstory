<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:replace="~{include/layout :: head('사용자 등록')}"></head>
<body>

<header th:replace="~{include/header :: header}"></header>

<div class="app-body">
    <aside th:replace="~{include/sidebar :: sidebar}"></aside>

    <main class="app-content">

        <!-- 페이지 헤더 -->
        <div class="page-header">
            <div>
                <div class="breadcrumb-area">
                    <i class="fas fa-house"></i>
                    <i class="fas fa-chevron-right"></i>
                    <span>사용자 관리</span>
                    <i class="fas fa-chevron-right"></i>
                    <span>사용자 등록</span>
                </div>
                <h2 class="page-title">사용자 등록</h2>
                <p class="page-subtitle">새 시스템 사용자 계정을 등록합니다.</p>
            </div>
        </div>

        <!-- 알림 -->
        <div th:if="${successMsg}" class="alert alert-success" style="margin-bottom:1rem;">
            <i class="fas fa-circle-check"></i>
            <span th:text="${successMsg}"></span>
        </div>
        <div th:if="${errorMsg}" class="alert alert-danger" style="margin-bottom:1rem;">
            <i class="fas fa-circle-exclamation"></i>
            <span th:text="${errorMsg}"></span>
        </div>

        <!-- 등록 폼 -->
        <div class="card">
            <div class="card-header">
                <span class="card-title">
                    <i class="fas fa-user-plus"></i> 기본 정보
                </span>
            </div>
            <div class="card-body">
                <form th:action="@{/user/register}" method="post" th:object="${userCreateDto}"
                      style="max-width: 640px;">

                    <!-- 아이디 -->
                    <div class="form-group" style="margin-bottom:1.2rem;">
                        <label class="form-label" style="display:block;font-weight:600;margin-bottom:.4rem;">
                            아이디 <span style="color:var(--red-500);">*</span>
                        </label>
                        <input type="text" th:field="*{userId}" class="modal-input"
                               placeholder="로그인 아이디 (영문, 숫자)" maxlength="50"
                               style="width:100%;"/>
                        <div th:if="${#fields.hasErrors('userId')}"
                             style="color:var(--red-500);font-size:.82rem;margin-top:.3rem;"
                             th:errors="*{userId}"></div>
                    </div>

                    <!-- 이름 -->
                    <div class="form-group" style="margin-bottom:1.2rem;">
                        <label class="form-label" style="display:block;font-weight:600;margin-bottom:.4rem;">
                            이름 <span style="color:var(--red-500);">*</span>
                        </label>
                        <input type="text" th:field="*{name}" class="modal-input"
                               placeholder="사용자 이름" maxlength="100"
                               style="width:100%;"/>
                        <div th:if="${#fields.hasErrors('name')}"
                             style="color:var(--red-500);font-size:.82rem;margin-top:.3rem;"
                             th:errors="*{name}"></div>
                    </div>

                    <!-- 이메일 -->
                    <div class="form-group" style="margin-bottom:1.2rem;">
                        <label class="form-label" style="display:block;font-weight:600;margin-bottom:.4rem;">
                            이메일 <span style="color:var(--red-500);">*</span>
                        </label>
                        <input type="email" th:field="*{email}" class="modal-input"
                               placeholder="example@company.com" maxlength="100"
                               style="width:100%;"/>
                        <div th:if="${#fields.hasErrors('email')}"
                             style="color:var(--red-500);font-size:.82rem;margin-top:.3rem;"
                             th:errors="*{email}"></div>
                    </div>

                    <!-- 휴대번호 -->
                    <div class="form-group" style="margin-bottom:1.2rem;">
                        <label class="form-label" style="display:block;font-weight:600;margin-bottom:.4rem;">
                            휴대번호
                        </label>
                        <input type="text" th:field="*{phone}" class="modal-input"
                               placeholder="010-0000-0000" maxlength="20"
                               style="width:100%;"/>
                    </div>

                    <!-- 부서 -->
                    <div class="form-group" style="margin-bottom:1.2rem;">
                        <label class="form-label" style="display:block;font-weight:600;margin-bottom:.4rem;">
                            부서
                        </label>
                        <select th:field="*{deptCode}" class="modal-input" style="width:100%;">
                            <option value="">── 부서 없음 ──</option>
                            <option th:each="dept : ${deptList}"
                                    th:value="${dept.deptCode}"
                                    th:text="${dept.deptName}">부서명</option>
                        </select>
                    </div>

                    <!-- 담당 업무 -->
                    <div class="form-group" style="margin-bottom:1.2rem;">
                        <label class="form-label" style="display:block;font-weight:600;margin-bottom:.4rem;">
                            담당 업무
                        </label>
                        <input type="text" th:field="*{jobDuty}" class="modal-input"
                               placeholder="담당 업무 내용 입력" maxlength="200"
                               style="width:100%;"/>
                    </div>

                    <!-- 역할 -->
                    <div class="form-group" style="margin-bottom:1.2rem;">
                        <label class="form-label" style="display:block;font-weight:600;margin-bottom:.4rem;">
                            역할 <span style="color:var(--red-500);">*</span>
                        </label>
                        <select th:field="*{role}" class="modal-input" style="width:100%;">
                            <option value="USER">USER</option>
                            <option value="ADMIN">ADMIN</option>
                        </select>
                    </div>

                    <!-- 비밀번호 -->
                    <div class="form-group" style="margin-bottom:1.2rem;">
                        <label class="form-label" style="display:block;font-weight:600;margin-bottom:.4rem;">
                            초기 비밀번호 <span style="color:var(--red-500);">*</span>
                        </label>
                        <input type="password" th:field="*{password}" class="modal-input"
                               placeholder="초기 비밀번호" maxlength="100"
                               style="width:100%;"/>
                        <div th:if="${#fields.hasErrors('password')}"
                             style="color:var(--red-500);font-size:.82rem;margin-top:.3rem;"
                             th:errors="*{password}"></div>
                    </div>

                    <!-- 계정 유효기간 -->
                    <div style="display:flex;gap:1rem;margin-bottom:1.2rem;">
                        <div class="form-group" style="flex:1;">
                            <label class="form-label" style="display:block;font-weight:600;margin-bottom:.4rem;">
                                사용 시작일
                            </label>
                            <input type="date" th:field="*{validStartDate}" class="modal-input"
                                   style="width:100%;"/>
                        </div>
                        <div class="form-group" style="flex:1;">
                            <label class="form-label" style="display:block;font-weight:600;margin-bottom:.4rem;">
                                사용 종료일
                                <span style="font-weight:400;color:var(--gray-400);font-size:.8rem;">(미입력 시 무제한)</span>
                            </label>
                            <input type="date" th:field="*{validEndDate}" class="modal-input"
                                   style="width:100%;"/>
                        </div>
                    </div>

                    <!-- 버튼 -->
                    <div style="display:flex;gap:.8rem;margin-top:1.5rem;">
                        <button type="submit" class="btn-modal-save">
                            <i class="fas fa-user-plus"></i> 등록
                        </button>
                        <button type="reset" class="btn-modal-cancel">
                            <i class="fas fa-rotate-left"></i> 초기화
                        </button>
                    </div>

                </form>
            </div>
        </div>

    </main>
</div>

<footer th:replace="~{include/footer :: footer}"></footer>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/js/common.js}"></script>

</body>
</html>
