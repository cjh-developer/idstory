<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security" lang="ko">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title th:text="#{reset.form.title}">새 비밀번호 설정</title>

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"/>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css"/>
    <link rel="stylesheet" th:href="@{/css/common.css}"/>
    <link rel="stylesheet" th:href="@{/css/login.css}"/>
</head>
<body>

<div class="login-wrapper">
    <div class="login-card">

        <div class="card-header-blue">
            <div class="icon-circle"><i class="fas fa-lock-open"></i></div>
            <h1 th:text="#{reset.form.title}">새 비밀번호 설정</h1>
            <p  th:text="#{reset.form.subtitle}">새로운 비밀번호를 입력해 주세요.</p>
        </div>

        <div class="card-body-p">

            <!-- 토큰 오류 (token이 없는 경우) -->
            <div th:if="${errorKey != null and token == null}" class="token-error">
                <i class="fas fa-circle-xmark"></i>
                <p th:text="#{${errorKey}}">유효하지 않은 링크입니다.</p>
                <a class="back-link" th:href="@{/password-reset}">
                    <i class="fas fa-rotate-right"></i> 다시 요청하기
                </a>
            </div>

            <!-- 정상 폼 -->
            <div th:if="${token != null}">

                <div th:if="${errorKey}" class="alert alert-danger" role="alert">
                    <i class="fas fa-circle-exclamation"></i>
                    <span th:text="#{${errorKey}}">오류가 발생했습니다.</span>
                </div>

                <form th:action="@{/password-reset/confirm}" method="post" novalidate>
                    <input type="hidden" name="token" th:value="${token}"/>

                    <!-- 새 비밀번호 -->
                    <div class="field-group">
                        <label class="field-label" for="newPassword" th:text="#{reset.form.newPassword}">새 비밀번호</label>
                        <div class="field-wrap">
                            <i class="fas fa-lock field-icon"></i>
                            <input id="newPassword" name="newPassword" type="password"
                                   class="form-input"
                                   th:placeholder="#{reset.form.newPassword.placeholder}"
                                   required autocomplete="new-password"/>
                            <button type="button" class="pw-toggle"
                                    onclick="togglePassword('newPassword', this)">
                                <i class="fas fa-eye"></i>
                            </button>
                        </div>
                        <!-- 강도 바 -->
                        <div class="strength-bar">
                            <div class="strength-fill" id="strengthFill"></div>
                        </div>
                    </div>

                    <!-- 비밀번호 확인 -->
                    <div class="field-group" style="margin-bottom:1.3rem;">
                        <label class="field-label" for="confirmPassword" th:text="#{reset.form.confirmPassword}">비밀번호 확인</label>
                        <div class="field-wrap">
                            <i class="fas fa-lock field-icon"></i>
                            <input id="confirmPassword" name="confirmPassword" type="password"
                                   class="form-input"
                                   th:placeholder="#{reset.form.confirmPassword.placeholder}"
                                   required autocomplete="new-password"/>
                            <button type="button" class="pw-toggle"
                                    onclick="togglePassword('confirmPassword', this)">
                                <i class="fas fa-eye"></i>
                            </button>
                        </div>
                    </div>

                    <button type="submit" class="btn-primary-blue" th:text="#{reset.form.submit}">비밀번호 변경</button>

                </form>

                <!-- 비로그인: 로그인으로 / 로그인 중: 메인으로 -->
                <a class="back-link" sec:authorize="!isAuthenticated()" th:href="@{/login}">
                    <i class="fas fa-arrow-left"></i>
                    <span th:text="#{reset.back}">로그인으로 돌아가기</span>
                </a>
                <a class="back-link" sec:authorize="isAuthenticated()" th:href="@{/main/dashboard}">
                    <i class="fas fa-arrow-left"></i>
                    <span th:text="#{reset.back.main}">메인페이지로 복귀</span>
                </a>

            </div>

        </div>

        <div class="card-footer-line">
            <p th:text="#{common.copyright}">© 2024 IDStory.</p>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/js/common.js}"></script>
<script th:src="@{/js/login.js}"></script>
</body>
</html>
