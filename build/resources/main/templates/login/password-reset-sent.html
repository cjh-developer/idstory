<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security" lang="ko">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title th:text="#{reset.sent.title}">초기화 링크 생성 완료</title>

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"/>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css"/>
    <link rel="stylesheet" th:href="@{/css/common.css}"/>
    <link rel="stylesheet" th:href="@{/css/login.css}"/>
</head>
<body>

<div class="wide-wrapper">
    <div class="login-card">

        <div class="card-header-blue">
            <div class="icon-circle"><i class="fas fa-envelope-open-text"></i></div>
            <h1 th:text="#{reset.sent.title}">초기화 링크 생성 완료</h1>
            <p  th:text="#{reset.sent.subtitle}">아래 링크를 클릭하여 비밀번호를 초기화하세요.</p>
        </div>

        <div class="card-body-p">

            <!-- 유효 기간 경고 -->
            <div class="warning-box">
                <i class="fas fa-triangle-exclamation"></i>
                <span th:text="#{reset.sent.warning}">이 링크는 24시간 동안 유효하며 한 번만 사용 가능합니다.</span>
            </div>

            <!-- 초기화 링크 -->
            <div class="link-box">
                <div class="link-box-label">
                    <i class="fas fa-link"></i>
                    <span th:text="#{reset.sent.linkLabel}" style="margin-left:.3rem;">비밀번호 초기화 링크</span>
                </div>
                <a class="link-url" th:href="${resetUrl}" th:text="${resetUrl}">http://...</a>
                <button class="btn-copy" type="button" onclick="copyResetLink()">
                    <i class="fas fa-copy"></i> 복사
                </button>
            </div>

            <!-- 비로그인: 로그인으로 / 로그인 중: 메인으로 -->
            <a class="back-link" sec:authorize="!isAuthenticated()" th:href="@{/login}">
                <i class="fas fa-arrow-left"></i>
                <span th:text="#{reset.back}">로그인으로 돌아가기</span>
            </a>
            <a class="back-link" sec:authorize="isAuthenticated()" th:href="@{/main/dashboard}">
                <i class="fas fa-arrow-left"></i>
                <span th:text="#{reset.back.main}">메인페이지로 복귀</span>
            </a>

        </div>

        <div class="card-footer-line">
            <p th:text="#{common.copyright}">© 2024 IDStory.</p>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/js/common.js}"></script>
<script th:src="@{/js/login.js}"></script>
</body>
</html>
