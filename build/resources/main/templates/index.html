<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title th:text="#{login.title}">통합 로그인</title>

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"/>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css"/>
    <link rel="stylesheet" th:href="@{/css/common.css}"/>
    <link rel="stylesheet" th:href="@{/css/login.css}"/>
</head>
<body>

<div class="login-wrapper">
    <div class="login-card">

        <!-- ── 폼 영역 ───────────────────────────────────────── -->
        <div class="login-body">

            <!-- 폼 타이틀 -->
            <div class="form-title">
                <div class="form-logo">
                    <i class="fas fa-shield-halved"></i>
                </div>
                <h1 th:text="#{login.title}">통합 로그인</h1>
            </div>

            <!-- 언어 전환 -->
            <div class="lang-bar">
                <a class="lang-btn" th:href="@{/(lang='ko')}"  th:text="#{lang.ko}">한국어</a>
                <a class="lang-btn" th:href="@{/(lang='en')}"  th:text="#{lang.en}">English</a>
            </div>

            <!-- 로그인 실패 -->
            <div th:if="${param.error}" class="alert alert-danger" role="alert">
                <i class="fas fa-circle-exclamation"></i>
                <span th:text="#{login.error}">아이디 또는 비밀번호가 올바르지 않습니다.</span>
            </div>

            <!-- 로그아웃 완료 -->
            <div th:if="${param.logout}" class="alert alert-success" role="alert">
                <i class="fas fa-circle-check"></i>
                <span th:text="#{login.logout}">로그아웃되었습니다.</span>
            </div>

            <!-- 비밀번호 변경 성공 (flash attribute) -->
            <div th:if="${successKey}" class="alert alert-success" role="alert">
                <i class="fas fa-circle-check"></i>
                <span th:text="#{${successKey}}">비밀번호가 변경되었습니다.</span>
            </div>

            <!-- 로그인 폼 -->
            <form th:action="@{/login}" method="post" autocomplete="off" novalidate>

                <!-- 아이디 -->
                <div class="field-group">
                    <label class="field-label" for="username" th:text="#{login.username}">사용자 아이디</label>
                    <div class="field-wrap">
                        <i class="fas fa-user field-icon"></i>
                        <input id="username" name="username" type="text"
                               class="form-input no-right-pad"
                               th:placeholder="#{login.username.placeholder}"
                               autocomplete="username"
                               required autofocus/>
                    </div>
                </div>

                <!-- 비밀번호 -->
                <div class="field-group">
                    <label class="field-label" for="password" th:text="#{login.password}">비밀번호</label>
                    <div class="field-wrap">
                        <i class="fas fa-lock field-icon"></i>
                        <input id="password" name="password" type="password"
                               class="form-input"
                               th:placeholder="#{login.password.placeholder}"
                               autocomplete="current-password"
                               required/>
                        <button type="button" class="pw-toggle"
                                onclick="togglePassword('password', this)">
                            <i class="fas fa-eye"></i>
                        </button>
                    </div>
                </div>

                <!-- 로그인 유지 -->
                <div class="check-row">
                    <input type="checkbox" id="remember-me" name="remember-me"/>
                    <label for="remember-me" th:text="#{login.remember}">로그인 유지</label>
                </div>

                <!-- 로그인 버튼 -->
                <button type="submit" class="btn-login" th:text="#{login.button}">로그인</button>

            </form>

            <!-- 비밀번호 찾기 -->
            <a class="forgot-link" th:href="@{/password-reset}" th:text="#{login.forgotPassword}">
                비밀번호를 잊으셨나요?
            </a>

        </div>

        <!-- ── 푸터 ─────────────────────────────────────────── -->
        <div class="login-footer">
            <p th:text="#{common.copyright}">© 2024 IDStory. All rights reserved.</p>
        </div>

    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/js/common.js}"></script>
<script th:src="@{/js/login.js}"></script>
</body>
</html>
